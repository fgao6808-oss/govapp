<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>物料及商品数据治理系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f0f4f8;--bg2:#fff;--bg3:#f7f9fc;--bg4:#eef2f7;
  --border:#e2e8f0;--border2:#cbd5e1;
  --text:#1e293b;--text2:#475569;--text3:#94a3b8;
  --blue:#2563eb;--blue2:#1d4ed8;--blue-light:#eff6ff;
  --cyan:#0891b2;--cyan-light:#ecfeff;
  --green:#059669;--green-light:#ecfdf5;
  --amber:#d97706;--amber-light:#fffbeb;
  --red:#dc2626;--red-light:#fef2f2;
  --sidebar:#1e3a5f;--sidebar-text:#94b8d8;
}
html,body{height:100%;font-family:'Microsoft YaHei',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px}
#login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1e3a5f,#1e40af,#0e7490)}
.login-box{background:#fff;border-radius:16px;padding:40px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo .icon{width:56px;height:56px;background:linear-gradient(135deg,#2563eb,#06b6d4);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 12px}
.login-logo h1{font-size:17px;color:var(--text);font-weight:600;line-height:1.4}
.login-logo span{font-size:12px;color:var(--text3)}
.login-err{background:var(--red-light);color:var(--red);padding:8px 12px;border-radius:6px;font-size:13px;margin-bottom:12px;display:none}
#app{display:none;height:100vh;flex-direction:row}
.sidebar{width:220px;min-width:220px;background:var(--sidebar);display:flex;flex-direction:column;box-shadow:2px 0 8px rgba(0,0,0,.1)}
.logo{padding:16px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,#3b82f6,#06b6d4);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.logo-text{font-size:12px;font-weight:600;color:#fff;line-height:1.4}
.logo-text span{display:block;color:var(--sidebar-text);font-size:11px;font-weight:400}
.nav{flex:1;overflow-y:auto;padding:8px 0}
.nav::-webkit-scrollbar{width:3px}
.nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
.nav-group-label{padding:10px 16px 3px;font-size:11px;color:rgba(148,184,216,.65);letter-spacing:.08em}
.nav-item{padding:8px 16px;cursor:pointer;display:flex;align-items:center;gap:9px;font-size:13px;color:var(--sidebar-text);transition:all .15s;border-left:2px solid transparent}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
.nav-item.active{background:rgba(255,255,255,.14);color:#fff;border-left-color:#3b82f6}
.nav-sub .nav-item{padding-left:30px;font-size:12.5px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 22px;gap:16px;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.breadcrumb{font-size:13px;color:var(--text2)}
.avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#0891b2);display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;font-weight:600}
.content{flex:1;overflow-y:auto;padding:22px}
.content::-webkit-scrollbar{width:5px}
.content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card-sm{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
h1.pt{font-size:18px;font-weight:600;margin-bottom:18px}
h2{font-size:15px;font-weight:600;margin-bottom:14px}
h3{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:8px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.b-blue{background:var(--blue-light);color:var(--blue)}
.b-green{background:var(--green-light);color:var(--green)}
.b-amber{background:var(--amber-light);color:var(--amber)}
.b-red{background:var(--red-light);color:var(--red)}
.b-gray{background:var(--bg4);color:var(--text3)}
.b-cyan{background:var(--cyan-light);color:var(--cyan)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;font-size:13px;cursor:pointer;border:none;font-family:inherit;transition:all .15s;font-weight:500;white-space:nowrap}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover:not(:disabled){background:var(--blue2)}
.btn-outline{background:transparent;color:var(--text2);border:1px solid var(--border2)}.btn-outline:hover:not(:disabled){background:var(--bg3);color:var(--text)}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:6px}
.btn-green{background:var(--green-light);color:var(--green);border:1px solid #a7f3d0}
.btn-red{background:var(--red-light);color:var(--red);border:1px solid #fecaca}
.tbl-wrap{border-radius:10px;overflow:hidden;border:1px solid var(--border);margin-bottom:10px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:10px 12px;text-align:left;font-weight:500;color:var(--text3);border-bottom:1px solid var(--border);font-size:12px;background:var(--bg3);white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbff}
.fg{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;align-items:flex-end}
.fi{display:flex;flex-direction:column;gap:4px}
label{font-size:12px;color:var(--text3);font-weight:500}
input[type=text],input[type=password],input[type=number],select,textarea{background:#fff;border:1px solid var(--border2);border-radius:7px;padding:7px 10px;font-size:13px;color:var(--text);font-family:inherit;outline:none;transition:border-color .15s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.08)}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.stat-num{font-size:26px;font-weight:700;margin-top:4px}
.stat-sub{font-size:12px;color:var(--text3);margin-top:3px}
.upload-zone{border:2px dashed var(--border2);border-radius:10px;padding:36px 20px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg3)}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--blue);background:var(--blue-light)}
.steps{display:flex;align-items:center;padding:16px 20px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:16px;flex-wrap:wrap;gap:6px}
.step{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text3)}
.step.active{color:var(--blue);font-weight:500}
.step.done{color:var(--green)}
.step-num{width:26px;height:26px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.step.active .step-num{background:var(--blue);color:#fff}
.step.done .step-num{background:var(--green);color:#fff}
.step-line{height:2px;width:36px;background:var(--border2);flex-shrink:0}
.progress-bar{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;border-radius:3px;transition:width .4s}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:1000}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:28px;min-width:400px;max-width:600px;width:90%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-title{font-size:16px;font-weight:600;margin-bottom:20px}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;display:flex;align-items:flex-start;gap:8px}
.alert-green{background:var(--green-light);color:var(--green);border:1px solid #a7f3d0}
.alert-red{background:var(--red-light);color:var(--red);border:1px solid #fecaca}
.alert-amber{background:var(--amber-light);color:var(--amber);border:1px solid #fde68a}
.alert-blue{background:var(--blue-light);color:var(--blue);border:1px solid #bfdbfe}
#toast{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast-item{padding:12px 18px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.15);animation:slideIn .3s ease;display:flex;align-items:center;gap:8px}
.toast-success{background:var(--green);color:#fff}
.toast-error{background:var(--red);color:#fff}
.toast-info{background:var(--blue);color:#fff}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.hero{background:linear-gradient(135deg,#1e3a5f,#1e40af 50%,#0e7490);border-radius:12px;padding:26px 28px;color:#fff;margin-bottom:20px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;right:-50px;top:-50px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.06)}
input[type=checkbox]{width:15px;height:15px;accent-color:var(--blue);cursor:pointer;flex-shrink:0}
.empty{text-align:center;padding:40px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:10px}
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.form-group{margin-bottom:12px}
</style>
</head>
<body>

<div id="login-page">
  <div class="login-box">
    <div class="login-logo">
      <div class="icon">⬡</div>
      <h1>物料及商品数据治理系统</h1>
      <span>Data Governance Platform</span>
    </div>
    <div class="login-err" id="login-err"></div>
    <div class="form-group"><label>用户名</label><input type="text" id="inp-user" placeholder="请输入用户名"></div>
    <div class="form-group"><label>密码</label><input type="password" id="inp-pwd" placeholder="请输入密码" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn btn-primary" id="login-btn" style="width:100%;margin-top:8px;padding:10px" onclick="doLogin()">登 录</button>

  </div>
</div>

<div id="app" style="display:none;height:100vh;flex-direction:row">
  <div class="sidebar">
    <div class="logo">
      <div class="logo-icon">⬡</div>
      <div class="logo-text">物料及商品<span>数据治理系统</span></div>
    </div>
    <nav class="nav">
      <div class="nav-item active" data-page="dashboard" onclick="navTo(this)">⊞ &nbsp;工作台</div>
      <div class="nav-group-label">物料管理</div>
      <div class="nav-sub">
        <div class="nav-item" data-page="mat-gov" onclick="navTo(this)">物料治理</div>
        <div class="nav-item" data-page="mat-raw" onclick="navTo(this)">原始物料</div>
        <div class="nav-item" data-page="mat-arch" onclick="navTo(this)">物料档案</div>
      </div>
      <div class="nav-group-label">品类管理</div>
      <div class="nav-sub">
        <div class="nav-item" data-page="cat-dir" onclick="navTo(this)">品类目录</div>
        <div class="nav-item" data-page="cat-attr" onclick="navTo(this)">品类属性</div>
      </div>
      <div class="nav-group-label">商品管理</div>
      <div class="nav-sub">
        <div class="nav-item" data-page="goods-unify" onclick="navTo(this)">商品归一</div>
        <div class="nav-item" data-page="goods-raw" onclick="navTo(this)">原始商品</div>
        <div class="nav-item" data-page="goods-std" onclick="navTo(this)">标准商品</div>
      </div>
      <div class="nav-item" data-page="mapping" onclick="navTo(this)">⇄ &nbsp;商品物料映射</div>
      <div class="nav-item" data-page="settings" onclick="navTo(this)">⚙ &nbsp;系统设置</div>
    </nav>
  </div>
  <div class="main">
    <div class="topbar">
      <div class="breadcrumb" id="bc">工作台</div>
      <div style="flex:1"></div>
      <div style="font-size:12px;color:var(--text3);margin-right:14px"><span style="color:var(--green)">●</span> 系统正常 &nbsp;|&nbsp; <span id="model-label">未配置AI</span></div>
      <div style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2)">
        <div class="avatar">A</div>
        <span id="username-label">admin</span>
        <button class="btn btn-outline btn-sm" onclick="doLogout()">退出</button>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeMd()">
  <div class="modal" id="modal-box"></div>
</div>
<div id="toast"></div>

<script>
// ── API Layer ─────────────────────────────────────
let TOKEN = localStorage.getItem('token') || '';
const API = async (method, path, body, isFile) => {
  const opts = { method, headers: { 'Authorization': 'Bearer ' + TOKEN } };
  if (isFile) { opts.body = body; }
  else if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const r = await fetch('/api' + path, opts);
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.error || r.statusText);
  return data;
};
const GET = (p) => API('GET', p);
const POST = (p, b) => API('POST', p, b);
const PUT = (p, b) => API('PUT', p, b);
const DEL = (p) => API('DELETE', p);
const UPLOAD = (path, formData) => API('POST', path, formData, true);

// ── Helpers ───────────────────────────────────────
const fmtDate = d => d ? new Date(d).toLocaleDateString('zh-CN') : '—';
const genId = () => Date.now().toString(36) + Math.random().toString(36).slice(2,5);
const toast = (msg, type='success') => {
  const t = document.getElementById('toast');
  const d = document.createElement('div');
  d.className = `toast-item toast-${type}`;
  d.textContent = (type==='success'?'✓ ':type==='error'?'✗ ':'ℹ ') + msg;
  t.appendChild(d);
  setTimeout(() => d.style.opacity='0', 2500);
  setTimeout(() => d.remove(), 2900);
};
const openMd = html => { document.getElementById('modal-box').innerHTML = html; document.getElementById('modal-bg').classList.add('open'); };
const closeMd = () => document.getElementById('modal-bg').classList.remove('open');
const $ = id => document.getElementById(id);
const setHTML = (id, html) => { const el = $(id); if(el) el.innerHTML = html; };
const exportCSV = (filename, headers, rows) => {
  const csv = [headers.join(','), ...rows.map(r => r.map(c => `"${(c||'').toString().replace(/"/g,'""')}"`).join(','))].join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}));
  a.download = filename; a.click();
};

// ── Auth ─────────────────────────────────────────
async function doLogin() {
  const btn = $('login-btn');
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span> 登录中...';
  try {
    const data = await POST('/login', { username: $('inp-user').value.trim(), password: $('inp-pwd').value });
    TOKEN = data.token;
    localStorage.setItem('token', TOKEN);
    $('username-label').textContent = data.username;
    $('login-page').style.display = 'none';
    $('app').style.display = 'flex';
    $('login-err').style.display = 'none';
    await loadModelLabel();
    navTo(document.querySelector('.nav-item[data-page="dashboard"]'));
  } catch(e) {
    $('login-err').style.display = 'block';
    $('login-err').textContent = e.message || '登录失败';
  }
  btn.disabled = false; btn.textContent = '登 录';
}
function doLogout() {
  TOKEN = ''; localStorage.removeItem('token');
  $('app').style.display = 'none'; $('login-page').style.display = 'flex';
}
async function loadModelLabel() {
  try {
    const s = await GET('/settings');
    const map = {openai:'OpenAI GPT',deepseek:'DeepSeek',qianwen:'通义千问',claude:'Claude',custom:'自定义'};
    $('model-label').textContent = s.api_key ? (map[s.api_type]||'AI已配置') : '未配置AI';
  } catch{}
}

// ── Nav ───────────────────────────────────────────
const PAGE_TITLES = {dashboard:'工作台','mat-gov':'物料管理 / 物料治理','mat-raw':'物料管理 / 原始物料','mat-arch':'物料管理 / 物料档案','cat-dir':'品类管理 / 品类目录','cat-attr':'品类管理 / 品类属性','goods-unify':'商品管理 / 商品归一','goods-raw':'商品管理 / 原始商品','goods-std':'商品管理 / 标准商品',mapping:'商品物料映射',settings:'系统设置'};
function navTo(el) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  const page = el.dataset.page;
  $('bc').textContent = PAGE_TITLES[page] || page;
  $('content').scrollTop = 0;
  const fn = {dashboard:pgDashboard,'mat-gov':pgMatGov,'mat-raw':pgMatRaw,'mat-arch':pgMatArch,'cat-dir':pgCatDir,'cat-attr':pgCatAttr,'goods-unify':pgGoodsUnify,'goods-raw':pgGoodsRaw,'goods-std':pgGoodsStd,mapping:pgMapping,settings:pgSettings};
  if (fn[page]) fn[page]();
}
function goPage(page) { navTo(document.querySelector(`.nav-item[data-page="${page}"]`)); }

// ══════════════════════════════════════════════════
// DASHBOARD
// ══════════════════════════════════════════════════
async function pgDashboard() {
  $('content').innerHTML = `<div class="hero"><div style="position:relative"><div style="font-size:11px;letter-spacing:.14em;color:rgba(147,210,255,.9);margin-bottom:8px;font-weight:500">▸ DATA GOVERNANCE PLATFORM</div><h1 style="font-size:20px;margin-bottom:10px;color:#fff;font-weight:700">物料及商品数据治理系统</h1><p style="color:rgba(255,255,255,.8);font-size:13px;line-height:1.9;max-width:640px">集成 AI 大模型能力，提供物料数据智能治理、商品信息标准化归一、品类体系构建及属性智能生成。支持 OpenAI / DeepSeek / 通义千问 / Claude 四种模型。</p></div></div><div id="stats-grid" class="grid4" style="margin-bottom:20px"><div class="stat-card" style="border-top:3px solid #ccc;text-align:center;color:var(--text3)">加载中...</div></div><div class="grid2" id="dash-lists"></div>`;
  try {
    const s = await GET('/stats');
    $('stats-grid').innerHTML = `
    <div class="stat-card" style="border-top:3px solid var(--blue)"><div style="font-size:12px;color:var(--text3)">物料档案总数</div><div class="stat-num" style="color:var(--blue)">${s.matArchive.toLocaleString()}</div><div class="stat-sub">标准化物料档案</div></div>
    <div class="stat-card" style="border-top:3px solid var(--cyan)"><div style="font-size:12px;color:var(--text3)">标准商品档案</div><div class="stat-num" style="color:var(--cyan)">${s.goodsStd.toLocaleString()}</div><div class="stat-sub">归一后标准商品</div></div>
    <div class="stat-card" style="border-top:3px solid var(--amber)"><div style="font-size:12px;color:var(--text3)">品类目录数</div><div class="stat-num" style="color:var(--amber)">${s.categories.toLocaleString()}</div><div class="stat-sub">末级品类条数</div></div>
    <div class="stat-card" style="border-top:3px solid var(--red)"><div style="font-size:12px;color:var(--text3)">待治理物料</div><div class="stat-num" style="color:var(--red)">${s.matUntreated}</div><div class="stat-sub">原始物料未治理</div></div>`;
    const [rawList, archList] = await Promise.all([GET('/mat-raw?q='), GET('/mat-archive?q=')]);
    $('dash-lists').innerHTML = `
    <div class="card"><h2>📋 最新原始物料</h2>${rawList.slice(0,5).map(r=>`<div style="padding:8px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px"><span style="font-family:monospace;font-size:12px;color:var(--blue);flex-shrink:0">${r.code}</span><span style="flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.name}</span><span class="badge ${r.status==='已治理'?'b-green':'b-amber'}">${r.status}</span></div>`).join('')}${rawList.length===0?'<div class="empty"><div class="empty-icon">📋</div>暂无数据</div>':''}<div style="margin-top:10px"><button class="btn btn-outline btn-sm" onclick="goPage('mat-raw')">查看全部原始物料 →</button></div></div>

   govData=[]; govResults={success:[],fail:[]};

function onGovFile(inp){ if(inp.files[0]) { window._govFile = inp.files[0]; uploadGovFile(inp.files[0]); } }
async function uploadGovFile(file){
  if(!file.name.toLowerCase().endsWith('.csv')){toast('请上传CSV文件','error');return;}
  const fd=new FormData(); fd.append('file',file);
  try{
    const r=await UPLOAD('/upload/csv',fd);
    govData=r.rows;
    $('gov-finfo').style.display='block';
    $('gov-finfo').innerHTML=`<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--green-light);border-radius:8px;border:1px solid #a7f3d0"><span style="font-size:22px">📄</span><div style="flex:1"><div style="font-size:13px;font-weight:500">${file.name}</div><div style="font-size:12px;color:var(--text3)">${r.count} 行 · 列：${r.columns.join('、')}</div></div><span class="badge b-green">就绪</span></div><div style="display:flex;gap:8px;margin-top:10px"><button class="btn btn-outline btn-sm" onclick="pgMatGov()">重新上传</button><button class="btn btn-primary" onclick="startGovExtract()">▶ 开始 AI 提取</button></div>`;
  }catch(e){toast('上传失败：'+e.message,'error');}
}
async function startGovExtract(){
  if(!govData.length){toast('请先上传文件','error');return;}
  $('s1').className='step done';$('s2').className='step active';
  $('gov-panel').innerHTML=`<div class="card"><h2>⏳ AI 正在提取核心词...</h2><div class="progress-bar"><div class="progress-fill" id="gprog" style="width:0%;background:linear-gradient(90deg,var(--blue),var(--cyan))"></div></div><div style="font-size:13px;color:var(--text3);margin-top:10px" id="gstatus">准备中...</div><div style="margin-top:12px;max-height:200px;overflow-y:auto;font-size:12px;background:var(--bg3);border-radius:8px;padding:10px;line-height:1.8" id="glog"></div></div>`;
  const nameKey=Object.keys(govData[0]).find(k=>k.includes('名')||k.toLowerCase().includes('name'))||Object.keys(govData[0])[1]||'名称';
  const codeKey=Object.keys(govData[0]).find(k=>k.includes('编')||k.toLowerCase().includes('code'))||Object.keys(govData[0])[0]||'编码';
  const specKey=Object.keys(govData[0]).find(k=>k.includes('规')||k.includes('型'))||Object.keys(govData[0])[2]||'';
  const prompt=await GET('/settings').then(s=>s.mat_extract_prompt).catch(()=>'提取物料名称的核心词：只保留最基础的品类级核心词（如\'灯管\'、\'扳手\'、\'螺栓\'），去掉所有修饰属性，包括规格、型号、品牌、材质、工艺，以及功能性修饰语（如\'LED\'、\'一体\'、\'紫外线\'、\'活口\'等）。核心词必须是具体的物料类别，不能仅有宽泛的泛指词（如只提取出\'配件\'、\'零件\'、\'材料\'等则视为失败）。如果治理失败，请返回格式：\'FAIL:失败原因\'，否则只返回品类级核心词。');
  const success=[],fail=[];
  const batchSize=5;
  const log=$('glog');
  
  const archMap={};
  let tempNewArch=[], tempNewRaw=[];
  let counter=0;
  const codeResp=await GET('/gen-mat-code').catch(()=>({code:'ML000001'}));
  const prefix=codeResp.code.replace(/\d+$/,'');
  const digits=(codeResp.code.replace(prefix,'').length)||6;
  const startNum=parseInt(codeResp.code.replace(prefix,''))||1;

  for(let i=0;i<govData.length;i+=batchSize){
    const batch=govData.slice(i,i+batchSize);
    const pct=Math.round((i/govData.length)*100);
    $('gprog').style.width=pct+'%';
    $('gstatus').textContent=`处理第 ${i+1}–${Math.min(i+batchSize,govData.length)} 条，共 ${govData.length} 条...`;
    const names=batch.map(r=>r[nameKey]||'').filter(Boolean);
    if(!names.length){batch.forEach(r=>fail.push({...r,_name:r[nameKey],_code:r[codeKey],_spec:r[specKey]||'',failReason:'名称为空'}));continue;}
    try{
      const resp=await POST('/ai/chat',{systemPrompt:`你是物料名称提取专家。${prompt}。请对以下物料名称列表，每行提取核心词，只返回JSON数组格式，如["核心词1","核心词2"]，数组长度必须与输入行数一致。不要任何其他内容。`,userPrompt:names.join('\n')});
      let extracted;
      try{extracted=JSON.parse(resp.content.replace(/```json?|```/g,'').trim());}catch{extracted=resp.content.split('\n').map(s=>s.trim()).filter(Boolean);}
      batch.forEach((r,idx)=>{
        const core=extracted[idx]||'';
        const rawName=r[nameKey]||'';
        const rawCode=r[codeKey]||'';
        const rawSpec=r[specKey]||'';
        if(core && core.startsWith('FAIL:')){
          const reason = core.replace('FAIL:','').trim();
          fail.push({...r,_name:rawName,_code:rawCode,_spec:rawSpec,failReason:reason});
          log.innerHTML+=`<span style="color:var(--red)">✗ ${rawName} - ${reason}</span><br>`;
        }else if(core&&core!=='null'&&core!=='undefined'){
          const cword=core.trim();
          success.push({...r,_name:rawName,_code:rawCode,_spec:rawSpec,_core:cword});
          log.innerHTML+=`<span style="color:var(--green)">✓ ${rawName} → <strong>${cword}</strong></span><br>`;
          if(!archMap[cword]){
            const num=startNum+counter++;
            archMap[cword]={id:genId(),code:prefix+String(num).padStart(digits,'0'),name:cword,synonyms:'',raw_count:0,created_at:Date.now()};
          }
          if(rawName!==cword){
            const syns=archMap[cword].synonyms?archMap[cword].synonyms.split(','):[]; 
            if(!syns.includes(rawName)){syns.push(rawName);archMap[cword].synonyms=syns.join(',');}
          }
          archMap[cword].raw_count++;
          tempNewRaw.push({id:genId(),code:rawCode||'RM'+genId(),name:rawName,spec:rawSpec,new_code:archMap[cword].code,new_name:cword,status:'已治理',source:'CSV导入',created_at:Date.now()});
          if(!tempNewArch.find(a=>a.name===cword)) tempNewArch.push(archMap[cword]);
        }else{
          fail.push({...r,_name:rawName,_code:rawCode,_spec:rawSpec,failReason:'AI提取失败'});
          log.innerHTML+=`<span style="color:var(--red)">✗ ${rawName} - 提取失败</span><br>`;
        }
      });
      if(tempNewRaw.length >= 50){
        await POST('/mat-gov/save-results',{archive:Object.values(archMap),rawMats:tempNewRaw}).catch(console.error);
        tempNewRaw=[];
        log.innerHTML+=`<span style="color:var(--blue)">💾 已自动保存阶段治理结果 (${success.length} 条)</span><br>`;
      }
    }catch(err){
      batch.forEach(r=>fail.push({...r,_name:r[nameKey],_code:r[codeKey],_spec:r[specKey]||'',failReason:err.message}));
      log.innerHTML+=`<span style="color:var(--red)">✗ 节点失败: ${err.message}</span><br>`;
    }
    log.scrollTop=log.scrollHeight;
    await new Promise(r=>setTimeout(r,100));
  }
  govResults={success,fail};
  $('gprog').style.width='100%';
  const finalArch=Object.values(archMap);
  const summary = { total: govData.length, success: success.length, fail: fail.length, newArch: finalArch.length };
  await POST('/mat-gov/save-results',{
    archive: finalArch, 
    rawMats: tempNewRaw, 
    filename: window._govFile?.name || '未知文件',
    total: summary.total, success: summary.success, fail: summary.fail, newArch: summary.newArch,
    results: { success: success.map(s=>({code:s._code, name:s._name, core:s._core})), fail: fail.map(f=>({code:f._code, name:f._name, reason:f.failReason})) }
  }).catch(e=>toast('保存失败：'+e.message,'error'));
  $('s2').className='step done';$('s3').className='step active';
  $('gov-panel').innerHTML=`<div class="card"><h2>📊 提取完成</h2><div class="grid4" style="margin-bottom:16px">
    <div class="stat-card" style="border-top:3px solid var(--blue)"><div style="font-size:12px;color:var(--text3)">处理总数</div><div class="stat-num" style="color:var(--blue)">${govData.length}</div></div>
    <div class="stat-card" style="border-top:3px solid var(--green)"><div style="font-size:12px;color:var(--text3)">提取成功</div><div class="stat-num" style="color:var(--green)">${success.length}</div></div>
    <div class="stat-card" style="border-top:3px solid var(--red)"><div style="font-size:12px;color:var(--text3)">提取失败</div><div class="stat-num" style="color:var(--red)">${fail.length}</div></div>
    <div class="stat-card" style="border-top:3px solid var(--amber)"><div style="font-size:12px;color:var(--text3)">新增物料档案</div><div class="stat-num" style="color:var(--amber)">${finalArch.length}</div></div>
  </div>
  <div class="alert alert-green">✓ 成功提取的物料已自动去重合并，写入物料档案及原始物料库</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    ${fail.length>0?`<button class="btn btn-outline btn-sm" onclick="dlTpl('提取失败明细.csv',['原始编码','原始名称','规格型号','失败原因'],govResults.fail.map(r=>[r._code||'',r._name||'',r._spec||'',r.failReason||'']))">⬇ 下载失败明细</button>`:''}
    <button class="btn btn-outline btn-sm" onclick="dlNewArch()">⬇ 下载新物料明细</button>
    <button class="btn btn-outline btn-sm" onclick="dlMatMapping()">⬇ 下载映射表</button>
    <button class="btn btn-primary btn-sm" onclick="goPage('mat-arch')">查看物料档案 →</button>
  </div>
  ${success.length>0?`<div style="margin-top:16px"><h3>提取结果预览（前10条）</h3><div class="tbl-wrap"><table><thead><tr><th>原始名称</th><th>提取核心词</th></tr></thead><tbody>${success.slice(0,10).map(r=>`<tr><td>${r._name}</td><td style="color:var(--green);font-weight:600">${r._core}</td></tr>`).join('')}</tbody></table></div></div>`:''}
  </div>`;
}

// 通用列表页生成器

function makeListPage({title, apiPath, columns, searchPlaceholder, filterOptions, filterField, actions, rowRenderer, extraBtns, usePagination}) {
  let currPage = 1, pageSize = 100;
  $('content').innerHTML = `
  <h1 class="pt">${title}</h1>
  <div class="fg">
    <div class="fi"><label>搜索</label><input type="text" id="ls-q" placeholder="${searchPlaceholder||'搜索...'}" style="width:200px" oninput="loadList(1)"></div>
    ${filterOptions?`<div class="fi"><label>筛选</label><select id="ls-f" onchange="loadList(1)"><option>全部</option>${filterOptions.map(o=>`<option>${o}</option>`).join('')}</select></div>`:''}
    <button class="btn btn-outline" onclick="loadList(1)">🔍</button>
    <div style="flex:1"></div>
    ${usePagination?`<button class="btn btn-red btn-sm" onclick="clearAllData('${apiPath}')">⚠️ 一键删除所有</button><button class="btn btn-outline btn-sm" onclick="delSelected('${apiPath}')">批量删除勾选</button>`:''}
    ${extraBtns||''}
  </div>
  <div id="list-body"></div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-top:12px">
    <div id="list-foot" style="font-size:12px;color:var(--text3)"></div>
    ${usePagination?`<div id="list-pager" style="display:flex;gap:5px"></div>`:''}
  </div>`;

  window.loadList = async (page) => {
    if(page) currPage = page;
    const q = $('ls-q')?.value||'';
    const f = $('ls-f')?.value||'全部';
    let url = `${apiPath}?q=${encodeURIComponent(q)}`;
    if(f!=='全部'&&filterField) url+=`&filterField=${filterField}&filter=${encodeURIComponent(f)}`;
    if(usePagination) url += `&page=${currPage}&limit=${pageSize}`;
    
    try{
      const res = await GET(url);
      const rows = usePagination ? res.data : res;
      const total = usePagination ? res.total : rows.length;
      const el=$('list-body');if(!el)return;
      el.innerHTML=`<div class="tbl-wrap"><table><thead><tr>${usePagination?`<th><input type="checkbox" id="sel-all" onclick="toggleAll(this.checked)"></th>`:''}${columns.map(c=>`<th>${c.label}</th>`).join('')}<th>操作</th></tr></thead><tbody>${rows.length===0?`<tr><td colspan="${columns.length+(usePagination?2:1)}"><div class="empty"><div class="empty-icon">📋</div>暂无数据</div></td></tr>`:rows.map(r=>rowRenderer(r, usePagination)).join('')}</tbody></table></div>`;
      $('list-foot').textContent=`共 ${total} 条${usePagination?` · 当前第 ${currPage} 页`:''}`;
      if(usePagination) renderPager(total);
    }catch(e){toast('加载失败：'+e.message,'error');}
  };

  function renderPager(total) {
    const totalPages = Math.ceil(total / pageSize);
    let html = `<button class="btn btn-outline btn-sm" ${currPage<=1?'disabled':''} onclick="loadList(${currPage-1})">上一页</button>`;
    html += `<span style="display:flex;align-items:center;padding:0 10px;font-size:12px">${currPage} / ${totalPages || 1}</span>`;
    html += `<button class="btn btn-outline btn-sm" ${currPage>=totalPages?'disabled':''} onclick="loadList(${currPage+1})">下一页</button>`;
    $('list-pager').innerHTML = html;
  }

  window.toggleAll = (chk) => document.querySelectorAll('.row-sel').forEach(c => c.checked = chk);

  window.delSelected = async (path) => {
    const ids = Array.from(document.querySelectorAll('.row-sel:checked')).map(c => c.value);
    if(!ids.length) return toast('请先勾选数据','info');
    if(!confirm(`确定删除选中的 ${ids.length} 条数据吗？`)) return;
    try {
      await POST(path + '/bulk-delete', { ids });
      toast('已批量删除');
      loadList();
    } catch(e) { toast('删除失败: ' + e.message, 'error'); }
  };

  window.clearAllData = async (path) => {
    if(!confirm('🚨 确定要删除列表中的所有数据吗？此操作不可恢复！')) return;
    try {
      await POST(path + '/clear-all');
      toast('已清空全部数据');
      loadList(1);
    } catch(e) { toast('清空失败: ' + e.message, 'error'); }
  };

  window.loadList(1);
}

// AI单条生成品类关键属性
async function aiGenSingleAttr(id, l1, l2, l3, l4) {
  toast('正在AI生成属性...','info');
  try {
    const prompt = (await GET('/settings').catch(()=>({}))).cat_attr_prompt || '你是品类数据治理专家。根据给定的品类层级路径（一级>二级>三级>四级），为该末级品类生成4-5个关键SKU属性和2个补充属性。关键属性是决定SKU唯一性的核心维度（如规格、型号、材质、功率等），补充属性为辅助描述。只返回属性名称，用逗号分隔。不要任何其他内容。';
    const resp = await POST('/ai/chat', {
      systemPrompt: prompt,
      userPrompt: `品类路径：${l1} > ${l2} > ${l3} > ${l4}\n请为该末级品类生成关键SKU属性和补充属性，用逗号分隔返回属性名称。`
    });
    const attrs = resp.content.replace(/```[^`]*```/g,'').replace(/\n/g,',').replace(/、/g,',').split(',').map(s=>s.trim()).filter(Boolean).join(',');
    await PUT('/categories/'+id, {key_attrs: attrs});
    toast('属性已生成并保存');
    loadList();
  } catch(e) { toast('AI生成失败: '+e.message, 'error'); }
}

// AI批量生成品类关键属性
async function batchAiCatAttrs() {
  const checkboxes = document.querySelectorAll('.row-sel:checked');
  if (!checkboxes.length) { toast('请先勾选需要生成属性的品类','info'); return; }
  if (!confirm(`确定为选中的 ${checkboxes.length} 条品类AI生成关键属性吗？`)) return;

  const items = Array.from(checkboxes).map(cb => ({
    id: cb.value,
    l1: cb.dataset.l1 || '',
    l2: cb.dataset.l2 || '',
    l3: cb.dataset.l3 || '',
    l4: cb.dataset.l4 || ''
  }));

  openMd(`<div class="modal-title">✨ AI批量生成品类关键属性</div>
  <div class="progress-bar"><div class="progress-fill" id="cat-ai-prog" style="width:0%;background:linear-gradient(90deg,var(--blue),var(--cyan))"></div></div>
  <div style="font-size:13px;color:var(--text3);margin-top:10px" id="cat-ai-status">准备中...</div>
  <div style="margin-top:12px;max-height:250px;overflow-y:auto;font-size:12px;background:var(--bg3);border-radius:8px;padding:10px;line-height:1.8" id="cat-ai-log"></div>
  <div class="modal-footer"><button class="btn btn-outline" id="cat-ai-close" disabled onclick="closeMd();loadList()">关闭</button></div>`);

  const prompt = (await GET('/settings').catch(()=>({}))).cat_attr_prompt || '你是品类数据治理专家。根据给定的品类层级路径（一级>二级>三级>四级），为该末级品类生成4-5个关键SKU属性和2个补充属性。只返回属性名称，用逗号分隔。不要任何其他内容。';
  const log = $('cat-ai-log');
  const batchSize = 5;
  const updates = [];

  for (let i = 0; i < items.length; i += batchSize) {
    const batch = items.slice(i, i + batchSize);
    const pct = Math.round((i / items.length) * 100);
    $('cat-ai-prog').style.width = pct + '%';
    $('cat-ai-status').textContent = `处理第 ${i+1}–${Math.min(i+batchSize, items.length)} 条，共 ${items.length} 条...`;

    const inputText = batch.map(it => `${it.l1} > ${it.l2} > ${it.l3} > ${it.l4}`).join('\n');
    try {
      const resp = await POST('/ai/chat', {
        systemPrompt: prompt + '\n\n请对以下多个品类路径分别生成属性，每行一个品类的属性（逗号分隔），返回的行数必须与输入行数一致。不要返回其他任何内容。',
        userPrompt: inputText
      });
      const lines = resp.content.replace(/```[^`]*```/g,'').trim().split('\n').map(s=>s.trim()).filter(Boolean);
      batch.forEach((it, idx) => {
        const attrs = (lines[idx] || '').replace(/、/g,',').split(',').map(s=>s.trim()).filter(Boolean).join(',');
        if (attrs) {
          updates.push({id: it.id, key_attrs: attrs});
          log.innerHTML += `<span style="color:var(--green)">✓ ${it.l4} → ${attrs}</span><br>`;
        } else {
          log.innerHTML += `<span style="color:var(--red)">✗ ${it.l4} - 生成为空</span><br>`;
        }
      });
    } catch(e) {
      batch.forEach(it => {
        log.innerHTML += `<span style="color:var(--red)">✗ ${it.l4} - ${e.message}</span><br>`;
      });
    }
    log.scrollTop = log.scrollHeight;
    await new Promise(r => setTimeout(r, 100));
  }

  $('cat-ai-prog').style.width = '100%';
  $('cat-ai-status').textContent = `完成！成功 ${updates.length} 条，共 ${items.length} 条`;
  if (updates.length > 0) {
    await POST('/categories/batch-update-attrs', {updates}).catch(e => toast('保存失败: '+e.message,'error'));
  }
  $('cat-ai-close').disabled = false;
  toast(`已完成 ${updates.length} 条品类属性生成`);
}

// 编辑品类属性（增删改）
function editCatAttrs(id, currentAttrs, l4name) {
  const attrs = currentAttrs ? currentAttrs.split(',').map(s=>s.trim()).filter(Boolean) : [];
  const renderAttrs = (list) => {
    return list.length === 0
      ? '<div style="color:var(--text3);font-size:13px;text-align:center;padding:20px">暂无属性，请新增或AI生成</div>'
      : list.map((a,i) => `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">
        <input type="text" class="cat-attr-inp" value="${a}" style="flex:1;padding:5px 8px;font-size:13px" data-idx="${i}">
        <button class="btn btn-red btn-sm" onclick="removeCatAttrItem(${i})">删除</button>
      </div>`).join('');
  };

  window._editCatAttrId = id;
  window._editCatAttrList = [...attrs];

  openMd(`<div class="modal-title">🏷 编辑品类属性 · ${l4name}</div>
  <div id="cat-attr-list">${renderAttrs(attrs)}</div>
  <div style="display:flex;gap:8px;margin-top:12px">
    <input type="text" id="new-cat-attr" placeholder="输入新属性名称" style="flex:1">
    <button class="btn btn-outline btn-sm" onclick="addCatAttrItem()">+ 添加</button>
  </div>
  <div class="modal-footer">
    <button class="btn btn-outline" onclick="closeMd()">取消</button>
    <button class="btn btn-primary" onclick="saveCatAttrs()">💾 保存</button>
  </div>`);

  window._renderCatAttrList = renderAttrs;
}

function addCatAttrItem() {
  const val = $('new-cat-attr').value.trim();
  if (!val) { toast('请输入属性名称','error'); return; }
  window._editCatAttrList.push(val);
  $('cat-attr-list').innerHTML = window._renderCatAttrList(window._editCatAttrList);
  $('new-cat-attr').value = '';
}

function removeCatAttrItem(idx) {
  window._editCatAttrList.splice(idx, 1);
  $('cat-attr-list').innerHTML = window._renderCatAttrList(window._editCatAttrList);
}

async function saveCatAttrs() {
  // 读取最新值（用户可能inline编辑了）
  const inputs = document.querySelectorAll('.cat-attr-inp');
  const list = [];
  inputs.forEach(inp => { const v = inp.value.trim(); if(v) list.push(v); });
  const key_attrs = list.join(',');

    const code=prefix+String(startNum+i).padStart(digits,'0');
    stdGoods.push({id:genId(),code,name:stdName,raw_count:(g.originals||[]).length,created_at:Date.now()});
    (g.originals||[]).forEach(origName=>{
      const origRow=rawData.find(r=>r[nameKey]===origName);
      rawGoods.push({id:genId(),code:origRow?.[codeKey]||genId(),name:origName,std_code:code,std_name:stdName,source:'CSV导入',created_at:Date.now()});
    });
  });
  await POST('/goods-unify/save-results',{stdGoods,rawGoods});
  $('u3').className='step done';$('u4').className='step active';
  $('u-panel').innerHTML=`<div class="card"><div class="alert alert-green">✅ 归一完成！已生成 ${stdGoods.length} 条标准商品</div><div style="display:flex;gap:8px;margin-top:12px"><button class="btn btn-primary" onclick="goPage('goods-std')">查看标准商品 →</button><button class="btn btn-outline" onclick="goPage('goods-raw')">查看原始商品 →</button></div></div>`;
  toast('商品归一完成');
}

function pgGoodsRaw(){

async function importRawGoods(inp){
  const f=inp.files[0];if(!f)return;
  const fd=new FormData();fd.append('file',f);
  const r=await UPLOAD('/upload/csv',fd).catch(e=>{toast(e.message,'error');return null;});
  if(!r)return;
  const nameKey=Object.keys(r.rows[0]||{}).find(k=>k.includes('名'))||'商品名称';
  const codeKey=Object.keys(r.rows[0]||{}).find(k=>k.includes('编'))||'编码';
  for(const row of r.rows) await POST('/goods-raw',{code:row[codeKey]||genId(),name:row[nameKey]||'',status:'未归一',source:'手动导入'});
  loadList();toast(`导入 ${r.rows.length} 条`);inp.value='';
}

async function testAI(){

  await POST('/settings/password',{currentPassword:cp||'12345a',newPassword:np,newUsername:$('su').value}).catch(e=>toast(e.message,'error'));

async function saveCodeRule(){

// ══════════════════════════════════════════════════
// 通用 删除
// ══════════════════════════════════════════════════
async function delItem(apiPath, id){
  if(!confirm('确认删除？')) return;
  await DEL(apiPath+'/'+id);
  if(typeof loadList==='function') loadList();
  toast('已删除');
}

// ══════════════════════════════════════════════════
// 通用 CSV导入辅助
// ══════════════════════════════════════════════════
async function importRaw(inp, apiPath, nameHint, csvCols, dbCols){
  const f=inp.files[0];if(!f)return;
  const fd=new FormData();fd.append('file',f);
  const r=await UPLOAD('/upload/csv',fd).catch(e=>{toast(e.message,'error');return null;});
  if(!r)return;
  for(const row of r.rows){
    const obj={status:'未治理',source:'手动导入'};
    csvCols.forEach((col,i)=>obj[dbCols[i]]=row[col]||'');
    await POST('/'+apiPath,obj);
  }
  loadList();toast(`导入 ${r.rows.length} 条`);inp.value='';
}
