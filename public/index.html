<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>物料及商品数据治理系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f0f4f8;--bg2:#fff;--bg3:#f7f9fc;--bg4:#eef2f7;
  --border:#e2e8f0;--border2:#cbd5e1;
  --text:#1e293b;--text2:#475569;--text3:#94a3b8;
  --blue:#2563eb;--blue2:#1d4ed8;--blue-light:#eff6ff;
  --cyan:#0891b2;--cyan-light:#ecfeff;
  --green:#059669;--green-light:#ecfdf5;
  --amber:#d97706;--amber-light:#fffbeb;
  --red:#dc2626;--red-light:#fef2f2;
  --sidebar:#1e3a5f;--sidebar-text:#94b8d8;
}
html,body{height:100%;font-family:'Microsoft YaHei',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px}
#login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1e3a5f,#1e40af,#0e7490)}
.login-box{background:#fff;border-radius:16px;padding:40px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo .icon{width:56px;height:56px;background:linear-gradient(135deg,#2563eb,#06b6d4);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 12px}
.login-logo h1{font-size:17px;color:var(--text);font-weight:600;line-height:1.4}
.login-logo span{font-size:12px;color:var(--text3)}
.login-err{background:var(--red-light);color:var(--red);padding:8px 12px;border-radius:6px;font-size:13px;margin-bottom:12px;display:none}
#app{display:none;height:100vh;flex-direction:row}
.sidebar{width:220px;min-width:220px;background:var(--sidebar);display:flex;flex-direction:column;box-shadow:2px 0 8px rgba(0,0,0,.1)}
.logo{padding:16px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,#3b82f6,#06b6d4);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.logo-text{font-size:12px;font-weight:600;color:#fff;line-height:1.4}
.logo-text span{display:block;color:var(--sidebar-text);font-size:11px;font-weight:400}
.nav{flex:1;overflow-y:auto;padding:8px 0}
.nav::-webkit-scrollbar{width:3px}
.nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
.nav-group-label{padding:10px 16px 3px;font-size:11px;color:rgba(148,184,216,.65);letter-spacing:.08em}
.nav-item{padding:8px 16px;cursor:pointer;display:flex;align-items:center;gap:9px;font-size:13px;color:var(--sidebar-text);transition:all .15s;border-left:2px solid transparent}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
.nav-item.active{background:rgba(255,255,255,.14);color:#fff;border-left-color:#3b82f6}
.nav-sub .nav-item{padding-left:30px;font-size:12.5px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 22px;gap:16px;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.breadcrumb{font-size:13px;color:var(--text2)}
.avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#0891b2);display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;font-weight:600}
.content{flex:1;overflow-y:auto;padding:22px}
.content::-webkit-scrollbar{width:5px}
.content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card-sm{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
h1.pt{font-size:18px;font-weight:600;margin-bottom:18px}
h2{font-size:15px;font-weight:600;margin-bottom:14px}
h3{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:8px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.b-blue{background:var(--blue-light);color:var(--blue)}
.b-green{background:var(--green-light);color:var(--green)}
.b-amber{background:var(--amber-light);color:var(--amber)}
.b-red{background:var(--red-light);color:var(--red)}
.b-gray{background:var(--bg4);color:var(--text3)}
.b-cyan{background:var(--cyan-light);color:var(--cyan)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;font-size:13px;cursor:pointer;border:none;font-family:inherit;transition:all .15s;font-weight:500;white-space:nowrap}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover:not(:disabled){background:var(--blue2)}
.btn-outline{background:transparent;color:var(--text2);border:1px solid var(--border2)}.btn-outline:hover:not(:disabled){background:var(--bg3);color:var(--text)}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:6px}
.btn-green{background:var(--green-light);color:var(--green);border:1px solid #a7f3d0}
.btn-red{background:var(--red-light);color:var(--red);border:1px solid #fecaca}
.tbl-wrap{border-radius:10px;overflow:hidden;border:1px solid var(--border);margin-bottom:10px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:10px 12px;text-align:left;font-weight:500;color:var(--text3);border-bottom:1px solid var(--border);font-size:12px;background:var(--bg3);white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbff}
.fg{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;align-items:flex-end}
.fi{display:flex;flex-direction:column;gap:4px}
label{font-size:12px;color:var(--text3);font-weight:500}
input[type=text],input[type=password],input[type=number],select,textarea{background:#fff;border:1px solid var(--border2);border-radius:7px;padding:7px 10px;font-size:13px;color:var(--text);font-family:inherit;outline:none;transition:border-color .15s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.08)}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.stat-num{font-size:26px;font-weight:700;margin-top:4px}
.stat-sub{font-size:12px;color:var(--text3);margin-top:3px}
.upload-zone{border:2px dashed var(--border2);border-radius:10px;padding:36px 20px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg3)}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--blue);background:var(--blue-light)}
.steps{display:flex;align-items:center;padding:16px 20px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:16px;flex-wrap:wrap;gap:6px}
.step{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text3)}
.step.active{color:var(--blue);font-weight:500}
.step.done{color:var(--green)}
.step-num{width:26px;height:26px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.step.active .step-num{background:var(--blue);color:#fff}
.step.done .step-num{background:var(--green);color:#fff}
.step-line{height:2px;width:36px;background:var(--border2);flex-shrink:0}
.progress-bar{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;border-radius:3px;transition:width .4s}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:1000}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:28px;min-width:400px;max-width:600px;width:90%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-title{font-size:16px;font-weight:600;margin-bottom:20px}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;display:flex;align-items:flex-start;gap:8px}
.alert-green{background:var(--green-light);color:var(--green);border:1px solid #a7f3d0}
.alert-red{background:var(--red-light);color:var(--red);border:1px solid #fecaca}
.alert-amber{background:var(--amber-light);color:var(--amber);border:1px solid #fde68a}
.alert-blue{background:var(--blue-light);color:var(--blue);border:1px solid #bfdbfe}
#toast{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast-item{padding:12px 18px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.15);animation:slideIn .3s ease;display:flex;align-items:center;gap:8px}
.toast-success{background:var(--green);color:#fff}
.toast-error{background:var(--red);color:#fff}
.toast-info{background:var(--blue);color:#fff}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.hero{background:linear-gradient(135deg,#1e3a5f,#1e40af 50%,#0e7490);border-radius:12px;padding:26px 28px;color:#fff;margin-bottom:20px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;right:-50px;top:-50px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.06)}
input[type=checkbox]{width:15px;height:15px;accent-color:var(--blue);cursor:pointer;flex-shrink:0}
.empty{text-align:center;padding:40px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:10px}
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.form-group{margin-bottom:12px}
.tbl-wrap.goods-raw-wrap{overflow:auto}
.goods-raw-table{min-width:2450px}
.goods-raw-table .gr-col-select{position:sticky;left:0;z-index:4;background:var(--bg2);min-width:44px;width:44px}
.goods-raw-table thead .gr-col-select{background:var(--bg3);z-index:7}
.goods-raw-table .gr-col-code{position:sticky;left:44px;z-index:4;background:var(--bg2);min-width:140px;width:140px}
.goods-raw-table thead .gr-col-code{background:var(--bg3);z-index:7}
.goods-raw-table .gr-col-name{position:sticky;left:184px;z-index:4;background:var(--bg2);min-width:280px;width:280px}
.goods-raw-table thead .gr-col-name{background:var(--bg3);z-index:7}
.goods-raw-table .gr-col-category{min-width:320px;width:320px}
.goods-raw-table .gr-col-attrs{min-width:320px;width:320px}
.goods-raw-table .gr-col-missing{min-width:220px;width:220px}
.goods-raw-table .gr-col-status{position:sticky;right:100px;z-index:4;background:var(--bg2);min-width:110px;width:110px}
.goods-raw-table thead .gr-col-status{background:var(--bg3);z-index:7}
.goods-raw-table .gr-col-action{position:sticky;right:0;z-index:5;background:var(--bg2);min-width:100px;width:100px}
.goods-raw-table thead .gr-col-action{background:var(--bg3);z-index:7}
.goods-raw-table .gr-col-name,.goods-raw-table .gr-col-category,.goods-raw-table .gr-col-action{white-space:normal}
.goods-raw-table .gr-col-select,.goods-raw-table .gr-col-code,.goods-raw-table .gr-col-name{box-shadow:1px 0 0 var(--border)}
.goods-raw-table .gr-col-status,.goods-raw-table .gr-col-action{box-shadow:-1px 0 0 var(--border)}
.goods-raw-table tbody tr:hover .gr-col-select,
.goods-raw-table tbody tr:hover .gr-col-code,
.goods-raw-table tbody tr:hover .gr-col-name,
.goods-raw-table tbody tr:hover .gr-col-status,
.goods-raw-table tbody tr:hover .gr-col-action{background:#fafbff}
.goods-raw-attr-line{padding:2px 0;line-height:1.6}
.goods-raw-attr-label{color:var(--text3);margin-right:4px}
.goods-raw-missing-list{display:flex;flex-direction:column;gap:6px}
.goods-raw-missing-chip{display:inline-flex;align-items:center;max-width:100%;padding:4px 8px;border-radius:8px;background:#fff1f2;border:1px solid #fecdd3;color:#e11d48;font-weight:600;line-height:1.4}
.goods-raw-action-stack{display:flex;flex-direction:column;gap:6px}
.goods-raw-action-stack .btn{width:80px;justify-content:center;align-self:center;padding:4px 4px;font-size:11px;min-height:28px;border-radius:6px}
.goods-raw-action-stack .btn-outline{background:#fff}
.goods-raw-action-main.btn-primary{box-shadow:0 1px 2px rgba(37,99,235,.18)}
</style>
</head>
<body>

<div id="login-page">
  <div class="login-box">
    <div class="login-logo">
      <div class="icon">⬡</div>
      <h1>物料及商品数据治理系统</h1>
      <span>Data Governance Platform</span>
    </div>
    <div class="login-err" id="login-err"></div>
    <div class="form-group"><label>用户名</label><input type="text" id="inp-user" placeholder="请输入用户名"></div>
    <div class="form-group"><label>密码</label><input type="password" id="inp-pwd" placeholder="请输入密码" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn btn-primary" id="login-btn" style="width:100%;margin-top:8px;padding:10px" onclick="doLogin()">登 录</button>

  </div>
</div>

<div id="app" style="display:none;height:100vh;flex-direction:row">
  <div class="sidebar">
    <div class="logo">
      <div class="logo-icon">⬡</div>
      <div class="logo-text">物料及商品<span>数据治理系统</span></div>
    </div>
    <nav class="nav">
      <div class="nav-item active" data-page="dashboard" onclick="navTo(this)">⊞ &nbsp;工作台</div>
      <div class="nav-group-label">物料管理</div>
      <div class="nav-sub">
        <div class="nav-item" data-page="mat-gov" onclick="navTo(this)">物料治理</div>
        <div class="nav-item" data-page="mat-raw" onclick="navTo(this)">原始物料</div>
        <div class="nav-item" data-page="mat-arch" onclick="navTo(this)">物料档案</div>
      </div>
      <div class="nav-group-label">品类管理</div>
      <div class="nav-sub">
        <div class="nav-item" data-page="cat-dir" onclick="navTo(this)">品类目录</div>
      </div>
      <div class="nav-group-label">商品管理</div>
      <div class="nav-sub">
        <div class="nav-item" data-page="goods-unify" onclick="navTo(this)">商品归一</div>
        <div class="nav-item" data-page="goods-raw" onclick="navTo(this)">原始商品</div>
        <div class="nav-item" data-page="goods-std" onclick="navTo(this)">标准商品</div>
      </div>
      <div class="nav-item" data-page="mapping" onclick="navTo(this)">⇄ &nbsp;商品物料映射</div>
      <div class="nav-item" data-page="brands" onclick="navTo(this)">🏷 &nbsp;品牌库</div>
      <div class="nav-item" data-page="settings" onclick="navTo(this)">⚙ &nbsp;系统设置</div>
    </nav>
  </div>
  <div class="main">
    <div class="topbar">
      <div class="breadcrumb" id="bc">工作台</div>
      <div style="flex:1"></div>
      <div style="font-size:12px;color:var(--text3);margin-right:14px"><span style="color:var(--green)">●</span> 系统正常 &nbsp;|&nbsp; <span id="model-label">未配置AI</span></div>
      <div style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2)">
        <div class="avatar">A</div>
        <span id="username-label">admin</span>
        <button class="btn btn-outline btn-sm" onclick="doLogout()">退出</button>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeMd()">
  <div class="modal" id="modal-box"></div>
</div>
<div id="toast"></div>

<script>
// ── API Layer ─────────────────────────────────────
let TOKEN = localStorage.getItem('token') || '';
const API = async (method, path, body, isFile) => {
  const opts = { method, headers: { 'Authorization': 'Bearer ' + TOKEN } };
  if (isFile) { opts.body = body; }
  else if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const r = await fetch('/api' + path, opts);
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.error || r.statusText);
  return data;
};
const GET = (p) => API('GET', p);
const POST = (p, b) => API('POST', p, b);
const PUT = (p, b) => API('PUT', p, b);
const DEL = (p) => API('DELETE', p);
const UPLOAD = (path, formData) => API('POST', path, formData, true);

// ── Helpers ───────────────────────────────────────
const fmtDate = d => d ? new Date(d).toLocaleDateString('zh-CN') : '—';
const genId = () => Date.now().toString(36) + Math.random().toString(36).slice(2,5);
const toast = (msg, type='success') => {
  const t = document.getElementById('toast');
  const d = document.createElement('div');
  d.className = `toast-item toast-${type}`;
  d.textContent = (type==='success'?'✓ ':type==='error'?'✗ ':'ℹ ') + msg;
  t.appendChild(d);
  setTimeout(() => d.style.opacity='0', 2500);
  setTimeout(() => d.remove(), 2900);
};
const openMd = html => { document.getElementById('modal-box').innerHTML = html; document.getElementById('modal-bg').classList.add('open'); };
const closeMd = () => document.getElementById('modal-bg').classList.remove('open');
const esc = (value) => String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
const selectedRowIds = () => Array.from(document.querySelectorAll('.row-sel:checked')).map(c => c.value);
const splitMultiLines = (value) => {
  const text = String(value || '').trim();
  if (!text) return [];
  let rows = text.split(/\r?\n/).map(v => v.trim()).filter(Boolean);
  if (rows.length === 1 && !/^data:image\//i.test(rows[0]) && /[,;；，]/.test(rows[0])) {
    rows = rows[0].split(/[,;；，]+/).map(v => v.trim()).filter(Boolean);
  }
  return rows;
};
const $ = id => document.getElementById(id);
const setHTML = (id, html) => { const el = $(id); if(el) el.innerHTML = html; };
const exportCSV = (filename, headers, rows) => {
  const csv = [headers.join(','), ...rows.map(r => r.map(c => `"${(c||'').toString().replace(/"/g,'""')}"`).join(','))].join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}));
  a.download = filename; a.click();
};

// ── Auth ─────────────────────────────────────────
async function doLogin() {
  const btn = $('login-btn');
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span> 登录中...';
  try {
    const data = await POST('/login', { username: $('inp-user').value.trim(), password: $('inp-pwd').value });
    TOKEN = data.token;
    localStorage.setItem('token', TOKEN);
    $('username-label').textContent = data.username;
    $('login-page').style.display = 'none';
    $('app').style.display = 'flex';
    $('login-err').style.display = 'none';
    await loadModelLabel();
    navTo(document.querySelector('.nav-item[data-page="dashboard"]'));
  } catch(e) {
    $('login-err').style.display = 'block';
    $('login-err').textContent = e.message || '登录失败';
  }
  btn.disabled = false; btn.textContent = '登 录';
}
function doLogout() {
  TOKEN = ''; localStorage.removeItem('token');
  $('app').style.display = 'none'; $('login-page').style.display = 'flex';
}
async function loadModelLabel() {
  try {
    const s = await GET('/settings');
    const map = {openai:'OpenAI GPT',deepseek:'DeepSeek',qianwen:'通义千问',claude:'Claude',custom:'自定义'};
    $('model-label').textContent = s.api_key ? (map[s.api_type]||'AI已配置') : '未配置AI';
  } catch{}
}

// ── Nav ───────────────────────────────────────────
const PAGE_TITLES = {dashboard:'工作台','mat-gov':'物料管理 / 物料治理','mat-raw':'物料管理 / 原始物料','mat-arch':'物料管理 / 物料档案','cat-dir':'品类管理 / 品类目录','cat-attr':'品类管理 / 品类属性','goods-unify':'商品管理 / 商品归一','brands':'品牌库','goods-raw':'商品管理 / 原始商品','goods-std':'商品管理 / 标准商品',mapping:'商品物料映射',settings:'系统设置'};
function navTo(el) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  const page = el.dataset.page;
  $('bc').textContent = PAGE_TITLES[page] || page;
  $('content').scrollTop = 0;

    $('gprog').style.width=pct+'%';
    $('gstatus').textContent=`处理第 ${i+1}–${Math.min(i+batchSize,govData.length)} 条，共 ${govData.length} 条...`;
    const names=batch.map(r=>r[nameKey]||'').filter(Boolean);
    if(!names.length){batch.forEach(r=>fail.push({...r,_name:r[nameKey],_code:r[codeKey],_spec:r[specKey]||'',failReason:'名称为空'}));continue;}
    try{
      const resp=await POST('/ai/chat',{systemPrompt:`你是物料名称提取专家。${prompt}。请对以下物料名称列表，每行提取核心词，只返回JSON数组格式，如["核心词1","核心词2"]，数组长度必须与输入行数一致。不要任何其他内容。`,userPrompt:names.join('\n')});
      let extracted;
      try{extracted=JSON.parse(resp.content.replace(/```json?|```/g,'').trim());}catch{extracted=resp.content.split('\n').map(s=>s.trim()).filter(Boolean);}
      batch.forEach((r,idx)=>{
        const core=extracted[idx]||'';
        const rawName=r[nameKey]||'';
        const rawCode=r[codeKey]||'';
        const rawSpec=r[specKey]||'';
        if(core && core.startsWith('FAIL:')){
          const reason = core.replace('FAIL:','').trim();
          fail.push({...r,_name:rawName,_code:rawCode,_spec:rawSpec,failReason:reason});
          log.innerHTML+=`<span style="color:var(--red)">✗ ${rawName} - ${reason}</span><br>`;
        }else if(core&&core!=='null'&&core!=='undefined'){
          const cword=core.trim();
          success.push({...r,_name:rawName,_code:rawCode,_spec:rawSpec,_core:cword});
          log.innerHTML+=`<span style="color:var(--green)">✓ ${rawName} → <strong>${cword}</strong></span><br>`;
          if(!archMap[cword]){
            const num=startNum+counter++;
            archMap[cword]={id:genId(),code:prefix+String(num).padStart(digits,'0'),name:cword,synonyms:'',raw_count:0,created_at:Date.now()};
          }
          if(rawName!==cword){
            const syns=archMap[cword].synonyms?archMap[cword].synonyms.split(','):[]; 
            if(!syns.includes(rawName)){syns.push(rawName);archMap[cword].synonyms=syns.join(',');}
          }
          archMap[cword].raw_count++;
          tempNewRaw.push({id:genId(),code:rawCode||'RM'+genId(),name:rawName,spec:rawSpec,new_code:archMap[cword].code,new_name:cword,status:'已治理',source:'CSV导入',created_at:Date.now()});
          if(!tempNewArch.find(a=>a.name===cword)) tempNewArch.push(archMap[cword]);
        }else{
          fail.push({...r,_name:rawName,_code:rawCode,_spec:rawSpec,failReason:'AI提取失败'});
          log.innerHTML+=`<span style="color:var(--red)">✗ ${rawName} - 提取失败</span><br>`;
        }
      });
      if(tempNewRaw.length >= 50){
        await POST('/mat-gov/save-results',{archive:Object.values(archMap),rawMats:tempNewRaw}).catch(console.error);
        tempNewRaw=[];
        log.innerHTML+=`<span style="color:var(--blue)">💾 已自动保存阶段治理结果 (${success.length} 条)</span><br>`;
      }
    }catch(err){
      batch.forEach(r=>fail.push({...r,_name:r[nameKey],_code:r[codeKey],_spec:r[specKey]||'',failReason:err.message}));
      log.innerHTML+=`<span style="color:var(--red)">✗ 节点失败: ${err.message}</span><br>`;
    }
    log.scrollTop=log.scrollHeight;
    await new Promise(r=>setTimeout(r,100));
  }
  govResults={success,fail};
  $('gprog').style.width='100%';
  const finalArch=Object.values(archMap);
  const summary = { total: govData.length, success: success.length, fail: fail.length, newArch: finalArch.length };
  await POST('/mat-gov/save-results',{
    archive: finalArch, 
    rawMats: tempNewRaw, 
    filename: window._govFile?.name || '未知文件',
    total: summary.total, success: summary.success, fail: summary.fail, newArch: summary.newArch,
    results: { success: success.map(s=>({code:s._code, name:s._name, core:s._core})), fail: fail.map(f=>({code:f._code, name:f._name, reason:f.failReason})) }
  }).catch(e=>toast('保存失败：'+e.message,'error'));
  $('s2').className='step done';$('s3').className='step active';
  $('gov-panel').innerHTML=`<div class="card"><h2>📊 提取完成</h2><div class="grid4" style="margin-bottom:16px">
    <div class="stat-card" style="border-top:3px solid var(--blue)"><div style="font-size:12px;color:var(--text3)">处理总数</div><div class="stat-num" style="color:var(--blue)">${govData.length}</div></div>
    <div class="stat-card" style="border-top:3px solid var(--green)"><div style="font-size:12px;color:var(--text3)">提取成功</div><div class="stat-num" style="color:var(--green)">${success.length}</div></div>
    <div class="stat-card" style="border-top:3px solid var(--red)"><div style="font-size:12px;color:var(--text3)">提取失败</div><div class="stat-num" style="color:var(--red)">${fail.length}</div></div>
    <div class="stat-card" style="border-top:3px solid var(--amber)"><div style="font-size:12px;color:var(--text3)">新增物料档案</div><div class="stat-num" style="color:var(--amber)">${finalArch.length}</div></div>
  </div>
  <div class="alert alert-green">✓ 成功提取的物料已自动去重合并，写入物料档案及原始物料库</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    ${fail.length>0?`<button class="btn btn-outline btn-sm" onclick="dlTpl('提取失败明细.csv',['原始编码','原始名称','规格型号','失败原因'],govResults.fail.map(r=>[r._code||'',r._name||'',r._spec||'',r.failReason||'']))">⬇ 下载失败明细</button>`:''}
    <button class="btn btn-outline btn-sm" onclick="dlNewArch()">⬇ 下载新物料明细</button>
    <button class="btn btn-outline btn-sm" onclick="dlMatMapping()">⬇ 下载映射表</button>
    <button class="btn btn-primary btn-sm" onclick="goPage('mat-arch')">查看物料档案 →</button>
  </div>
  ${success.length>0?`<div style="margin-top:16px"><h3>提取结果预览（前10条）</h3><div class="tbl-wrap"><table><thead><tr><th>原始名称</th><th>提取核心词</th></tr></thead><tbody>${success.slice(0,10).map(r=>`<tr><td>${r._name}</td><td style="color:var(--green);font-weight:600">${r._core}</td></tr>`).join('')}</tbody></table></div></div>`:''}
  </div>`;
}

async function dlTaskResults(id) {

// 通用列表页生成器
// ══════════════════════════════════════════════════
function makeListPage({title, apiPath, columns, searchPlaceholder, filterOptions, filterField, actions, rowRenderer, extraBtns, usePagination, showMassOps = true, extraFilters = [], wrapperClass = '', tableClass = '', actionHeaderClass = ''}) {
  let currPage = 1, pageSize = 100;
  const extraFilterHtml = extraFilters.map((item, idx) => {
    const inputId = item.id || `ls-extra-${idx}`;
    const placeholder = item.placeholder || '请输入';
    return `<div class="fi"><label>${esc(item.label || '筛选')}</label><input type="text" id="${inputId}" placeholder="${esc(placeholder)}" style="width:${item.width || 180}px" oninput="loadList(1)"></div>`;
  }).join('');
  $('content').innerHTML = `
  <h1 class="pt">${title}</h1>
  <div class="fg">
    <div class="fi"><label>搜索</label><input type="text" id="ls-q" placeholder="${searchPlaceholder||'搜索...'}" style="width:200px" oninput="loadList(1)"></div>
    ${filterOptions?`<div class="fi"><label>筛选</label><select id="ls-f" onchange="loadList(1)"><option>全部</option>${filterOptions.map(o=>`<option>${o}</option>`).join('')}</select></div>`:''}
    ${extraFilterHtml}
    <button class="btn btn-outline" onclick="loadList(1)">🔍</button>
    <div style="flex:1"></div>
    ${usePagination && showMassOps?`<button class="btn btn-red btn-sm" onclick="clearAllData('${apiPath}')">⚠️ 一键清空</button><button class="btn btn-outline btn-sm" onclick="delSelected('${apiPath}')">批量删除勾选</button>`:''}
    ${extraBtns||''}
  </div>
  <div id="list-body"></div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-top:12px">
    <div id="list-foot" style="font-size:12px;color:var(--text3)"></div>
    ${usePagination?`<div id="list-pager" style="display:flex;gap:5px"></div>`:''}
  </div>`;

  window.loadList = async (page) => {
    if(page) currPage = page;
    const q = $('ls-q')?.value||'';
    const f = $('ls-f')?.value||'全部';
    let url = `${apiPath}?q=${encodeURIComponent(q)}`;
    if(f!=='全部'&&filterField) url+=`&filterField=${filterField}&filter=${encodeURIComponent(f)}`;
    extraFilters.forEach((item, idx) => {
      const inputId = item.id || `ls-extra-${idx}`;
      const field = item.field;
      const value = $(inputId)?.value?.trim() || '';
      if(field && value) url += `&${encodeURIComponent(field)}=${encodeURIComponent(value)}`;
    });
    if(usePagination) url += `&page=${currPage}&limit=${pageSize}`;
    
    try{
      const res = await GET(url);
      const rows = usePagination ? res.data : res;
      const total = usePagination ? res.total : rows.length;
      const el=$('list-body');if(!el)return;
      el.innerHTML=`<div class="tbl-wrap ${wrapperClass}"><table class="${tableClass}"><thead><tr>${usePagination?`<th class="${tableClass==='goods-raw-table'?'gr-col-select':''}"><input type="checkbox" id="sel-all" onclick="toggleAll(this.checked)"></th>`:''}${columns.map(c=>`<th class="${c.className||''}" style="${c.style||''}">${c.label}</th>`).join('')}<th class="${actionHeaderClass}">操作</th></tr></thead><tbody>${rows.length===0?`<tr><td colspan="${columns.length+(usePagination?2:1)}"><div class="empty"><div class="empty-icon">📋</div>暂无数据</div></td></tr>`:rows.map(r=>rowRenderer(r, usePagination)).join('')}</tbody></table></div>`;
      $('list-foot').textContent=`共 ${total} 条${usePagination?` · 当前第 ${currPage} 页`:''}`;
      if(usePagination) renderPager(total);
    }catch(e){toast('加载失败：'+e.message,'error');}
  };

  function renderPager(total) {
    const totalPages = Math.ceil(total / pageSize);
    let html = `<button class="btn btn-outline btn-sm" ${currPage<=1?'disabled':''} onclick="loadList(${currPage-1})">上一页</button>`;
    html += `<span style="display:flex;align-items:center;padding:0 10px;font-size:12px">${currPage} / ${totalPages || 1}</span>`;
    html += `<button class="btn btn-outline btn-sm" ${currPage>=totalPages?'disabled':''} onclick="loadList(${currPage+1})">下一页</button>`;
    $('list-pager').innerHTML = html;
  }

  window.toggleAll = (chk) => document.querySelectorAll('.row-sel').forEach(c => c.checked = chk);

  window.delSelected = async (path) => {
    const ids = Array.from(document.querySelectorAll('.row-sel:checked')).map(c => c.value);
    if(!ids.length) return toast('请先勾选数据','info');
    if(!confirm(`确定删除选中的 ${ids.length} 条数据吗？`)) return;
    try {
      await POST(path + '/bulk-delete', { ids });
      toast('已批量删除');
      loadList();
    } catch(e) { toast('删除失败: ' + e.message, 'error'); }
  };

  window.clearAllData = async (path) => {
    if(!confirm('🚨 确定要删除列表中的所有数据吗？此操作不可恢复！')) return;
    try {
      await POST(path + '/clear-all');
      toast('已清空全部数据');
      loadList(1);
    } catch(e) { toast('清空失败: ' + e.message, 'error'); }
  };

  window.loadList(1);
}

async function aiGenSingleAttr(id, l1, l2, l3, l4) {

    const resp = await POST('/ai/chat', {
      systemPrompt: prompt,
      userPrompt: `品类路径：${l1} > ${l2} > ${l3} > ${l4}\n请为该末级品类生成关键SKU属性和补充属性，用逗号分隔返回属性名称。`
    });

    await PUT('/categories/'+id, {key_attrs: attrs});

// AI批量生成品类关键属性
async function batchAiCatAttrs() {
  const checkboxes = document.querySelectorAll('.row-sel:checked');
  if (!checkboxes.length) { toast('请先勾选需要生成属性的品类','info'); return; }
  if (!confirm(`确定为选中的 ${checkboxes.length} 条品类AI生成关键属性吗？`)) return;

  const items = Array.from(checkboxes).map(cb => ({
    id: cb.value,
    l1: cb.dataset.l1 || '',
    l2: cb.dataset.l2 || '',
    l3: cb.dataset.l3 || '',
    l4: cb.dataset.l4 || ''
  }));

  openMd(`<div class="modal-title">✨ AI批量生成品类关键属性</div>
  <div class="progress-bar"><div class="progress-fill" id="cat-ai-prog" style="width:0%;background:linear-gradient(90deg,var(--blue),var(--cyan))"></div></div>
  <div style="font-size:13px;color:var(--text3);margin-top:10px" id="cat-ai-status">准备中...</div>
  <div style="margin-top:12px;max-height:250px;overflow-y:auto;font-size:12px;background:var(--bg3);border-radius:8px;padding:10px;line-height:1.8" id="cat-ai-log"></div>
  <div class="modal-footer"><button class="btn btn-outline" id="cat-ai-close" disabled onclick="closeMd();loadList()">关闭</button></div>`);

  const prompt = (await GET('/settings').catch(()=>({}))).cat_attr_prompt || '你是品类数据治理专家。根据给定的品类层级路径（一级>二级>三级>四级），为该末级品类生成4-5个关键SKU属性和2个补充属性。只返回属性名称，用逗号分隔。不要任何其他内容。';
  const log = $('cat-ai-log');
  const batchSize = 5;
  const updates = [];

  for (let i = 0; i < items.length; i += batchSize) {
    const batch = items.slice(i, i + batchSize);
    const pct = Math.round((i / items.length) * 100);
    $('cat-ai-prog').style.width = pct + '%';
    $('cat-ai-status').textContent = `处理第 ${i+1}–${Math.min(i+batchSize, items.length)} 条，共 ${items.length} 条...`;

    const inputText = batch.map(it => `${it.l1} > ${it.l2} > ${it.l3} > ${it.l4}`).join('\n');
    try {
      const resp = await POST('/ai/chat', {
        systemPrompt: prompt + '\n\n请对以下多个品类路径分别生成属性，每行一个品类的属性（逗号分隔），返回的行数必须与输入行数一致。不要返回其他任何内容。',
        userPrompt: inputText
      });
      const lines = resp.content.replace(/```[^`]*```/g,'').trim().split('\n').map(s=>s.trim()).filter(Boolean);
      batch.forEach((it, idx) => {
        const attrs = (lines[idx] || '').replace(/、/g,',').split(',').map(s=>s.trim()).filter(Boolean).join(',');
        if (attrs) {
          updates.push({id: it.id, key_attrs: attrs});
          log.innerHTML += `<span style="color:var(--green)">✓ ${it.l4} → ${attrs}</span><br>`;
        } else {
          log.innerHTML += `<span style="color:var(--red)">✗ ${it.l4} - 生成为空</span><br>`;
        }
      });
    } catch(e) {
      batch.forEach(it => {
        log.innerHTML += `<span style="color:var(--red)">✗ ${it.l4} - ${e.message}</span><br>`;
      });
    }
    log.scrollTop = log.scrollHeight;
    await new Promise(r => setTimeout(r, 100));
  }

  $('cat-ai-prog').style.width = '100%';
  $('cat-ai-status').textContent = `完成！成功 ${updates.length} 条，共 ${items.length} 条`;
  if (updates.length > 0) {
    await POST('/categories/batch-update-attrs', {updates}).catch(e => toast('保存失败: '+e.message,'error'));
  }
  $('cat-ai-close').disabled = false;
  toast(`已完成 ${updates.length} 条品类属性生成`);
}

    const l2=row['二级品类']||row['l2']||'';
    const l3=row['三级品类']||row['l3']||'';
    const code=row['品类编码']||row['code']||'';
    const key_attrs=row['品类关键属性']||row['key_attrs']||'';
    for(let i=0;i<l4list.length;i++){
      await POST('/categories',{code:code+(i>0?`-${i+1}`:''),l1,l2,l3,l4:l4list[i],key_attrs,status:l1&&l2&&l3&&l4list[i]?'正常':'异常'});
      added++;
    }
  }
  loadList();toast(`导入 ${added} 条品类`);inp.value='';
}

function upL4(){const l1=$('sl1').value,l2=$('sl2').value,l3=$('sl3').value;const l4s=[...new Set(window._cats.filter(c=>c.l1===l1&&c.l2===l2&&c.l3===l3).map(c=>c.l4))];$('sl4').innerHTML='<option value="">请选择</option>'+l4s.map(l=>`<option>${l}</option>`).join('');}

async function onUnifyFile(inp) {
  const file = inp.files[0];
  if (!file) return;
  const fd = new FormData(); fd.append('file', file);
  try {
    toast('正在解析文件...', 'info');
    const r = await UPLOAD('/upload/csv', fd);
    unifyData = r.rows;
    $('u-step-content').innerHTML = `
      <div class="alert alert-green">✓ 文件已就绪：<strong>${file.name}</strong> (${r.count} 行)</div>
      <div style="margin-top:20px;text-align:center">
        <button class="btn btn-primary btn-lg" onclick="step2Import()">🚀 开始执行流水线 (共7步)</button>
      </div>
    `;
  } catch (e) { toast(e.message, 'error'); }
}

function setStep(num) {
  document.querySelectorAll('#unify-steps .step').forEach(el=>el.className = 'step');
  for(let i=1; i<=7; i++) {
    const el = $(`us-${i}`);
    if(i < num) el.className = 'step done';
    else if(i === num) el.className = 'step active';
  }
}

function renderUnifyRunPanel(title, total, intro){
  return `<h2>${title}</h2>
    <div class="alert alert-blue">${esc(intro || '任务已创建，准备执行...')}</div>
    <div class="progress-bar"><div class="progress-fill" id="u-prog" style="width:0%;background:linear-gradient(90deg,var(--blue),var(--cyan))"></div></div>
    <div id="u-status" style="font-size:12px;color:var(--text3);margin-top:8px">待执行，共 ${Number(total||0)} 条</div>
    <div id="u-log" style="margin-top:12px;max-height:300px;overflow-y:auto;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;font-size:12px;line-height:1.75"></div>`;
}

function setUnifyRunProgress(done, total, statusText){
  const safeTotal = Math.max(Number(total || 0), 1);
  const percent = Math.max(0, Math.min(100, Math.round((Number(done || 0) / safeTotal) * 100)));
  if($('u-prog')) $('u-prog').style.width = `${percent}%`;
  if($('u-status')) $('u-status').textContent = statusText || '';
}

function appendUnifyRunLog(text, color='var(--text2)'){
  const log = $('u-log');
  if(!log) return;
  log.innerHTML += `<div style="color:${color}">${esc(text)}</div>`;
  log.scrollTop = log.scrollHeight;
}

function getUnifyItemMeta(id, idx=0){
  const item = goodsUnifyRunItems.find(v => v.id === id);
  return item || { id, orig_code: `#${idx + 1}`, orig_name: '' };
}

function formatUnifyItemLabel(id, idx=0){
  const item = getUnifyItemMeta(id, idx);
  return `${item.orig_code || `#${idx + 1}`}${item.orig_name ? `｜${item.orig_name}` : ''}`;
}

async function step2Import() {
  setStep(2);
  $('u-step-content').innerHTML = renderUnifyRunPanel('第二步：数据清洗（先清洗再入库）', unifyData.length, '正在清洗非法字符、非标准格式，并校验有效数据...');
  try {
    const r = await POST('/goods-unify/import', { rows: unifyData });
    goodsImportErrorLogs = Array.isArray(r.error_logs) ? r.error_logs : [];
    goodsUnifyRunItems = Array.isArray(r.insertedItems) ? r.insertedItems : [];
    goodsImportSummary = {
      total: Number(r.total || 0),
      success: Number(r.success || 0),
      invalid: Number(r.invalid || 0),
      duplicate: Number(r.duplicate || 0),
      valid: Number(r.valid || 0),
      cleanedFields: Number(r.cleanedFields || 0)
    };
    setUnifyRunProgress(r.total || 0, r.total || 1, `清洗与入库完成：总计 ${r.total} 条，新增 ${r.success} 条`);
    appendUnifyRunLog(`✓ 清洗完成：总计 ${r.total} 条，有效 ${r.valid} 条，清洗修正字段 ${r.cleanedFields} 个`, 'var(--green)');
    appendUnifyRunLog(`✓ 入库结果：新增 ${r.success} 条，重复编码跳过 ${r.duplicate} 条，无效 ${r.invalid} 条`, 'var(--green)');
    setTimeout(() => step3Store(r), 1200);
  } catch(e) { toast(e.message, 'error'); }
}

function downloadGoodsImportErrorLog() {
  if(!goodsImportErrorLogs.length) return toast('暂无错误日志可下载', 'info');
  exportCSV(
    '商品导入错误日志.csv',
    ['Excel行号','原始商品编号','原始商品名称','原始规格','原始品牌','不符合导入条件说明'],
    goodsImportErrorLogs.map(item => [
      item.row_no || '',
      item.raw_code || '',
      item.raw_name || '',
      item.raw_spec || '',
      item.raw_brand || '',
      item.reason || ''
    ])
  );
  toast('错误日志已下载');
}

async function step3Store(importResult) {
  const ids = importResult?.insertedIds || [];
  setStep(3);
  $('u-step-content').innerHTML = renderUnifyRunPanel('第三步：有效数据入库', ids.length || importResult?.total || 0, '有效商品已入库，准备执行品类匹配...');
  if(!ids.length) {
    const allInvalid = Number(importResult?.invalid || 0) > 0 && Number(importResult?.valid || 0) === 0;
    setUnifyRunProgress(importResult?.total || 0, importResult?.total || 1, '本次没有新增入库商品');
    appendUnifyRunLog('! 本次没有新增数据（可能全部重复或无效）', 'var(--amber)');
    if(allInvalid) {
      appendUnifyRunLog('✗ 当前附件识别结果为全部无效，可下载错误日志查看每一行不符合导入条件的原因', 'var(--red)');
    }
    $('u-step-content').innerHTML += `<div style="margin-top:20px;text-align:center;display:flex;justify-content:center;gap:10px;flex-wrap:wrap">${allInvalid?`<button class="btn btn-primary" onclick="downloadGoodsImportErrorLog()">下载错误日志</button>`:''}<button class="btn btn-outline" onclick="pgGoodsUnify()">返回第一步</button></div>`;
    return;
  }
  goodsUnifyRunItems.forEach((item, idx) => appendUnifyRunLog(`✓ [${idx + 1}/${ids.length}] 已入库 ${formatUnifyItemLabel(item.id, idx)}`, 'var(--green)'));
  setUnifyRunProgress(ids.length, ids.length, `有效数据入库完成，共 ${ids.length} 条，准备进入品类匹配...`);
  setTimeout(() => step4Category(ids), 1200);
}

async function step4Category(ids) {
  setStep(4);
  $('u-step-content').innerHTML = renderUnifyRunPanel('第四步：品类归属匹配', ids.length, '正在利用相似度召回 Top-5 分类并由 AI 进行最终判定...');
  try {
    let ok = 0, suspect = 0, fail = 0, err = 0;
    for(let i=0;i<ids.length;i++){
      const id = ids[i];
      const label = formatUnifyItemLabel(id, i);
      setUnifyRunProgress(i, ids.length, `正在执行 ${i + 1}/${ids.length}：${label}`);
      appendUnifyRunLog(`→ [${i + 1}/${ids.length}] 开始匹配分类：${label}`, 'var(--blue)');
      try{
        const r = await POST('/goods-unify/match-category', { ids:[id] });
        const item = Array.isArray(r) ? r[0] : null;
        if(item?.status === 'success'){
          ok++;
          appendUnifyRunLog(`✓ ${label} -> ${item.category || '分类已匹配'}`, 'var(--green)');
        }else if(item?.status === 'suspect'){
          suspect++;
          appendUnifyRunLog(`! ${label} 存在疑似分类，待人工确认`, 'var(--amber)');
        }else if(item?.status === 'fail'){
          fail++;
          appendUnifyRunLog(`! ${label} 未匹配到分类`, 'var(--amber)');
        }else if(item?.status === 'skip'){
          appendUnifyRunLog(`· ${label} 跳过：${item.reason || '已有分类'}`, 'var(--text3)');
        }else{
          err++;
          appendUnifyRunLog(`✗ ${label} 分类匹配失败：${item?.error || '未知错误'}`, 'var(--red)');
        }
      }catch(e){
        err++;
        appendUnifyRunLog(`✗ ${label} 分类匹配失败：${e.message}`, 'var(--red)');
      }
      setUnifyRunProgress(i + 1, ids.length, `分类匹配进度 ${i + 1}/${ids.length}`);
    }
    appendUnifyRunLog(`任务完成：成功 ${ok} 条，疑似 ${suspect} 条，未匹配 ${fail} 条，失败 ${err} 条`, 'var(--blue)');
    setTimeout(() => step5Feature(ids), 1500);
  } catch(e) { toast(e.message, 'error'); }
}

async function step5Feature(ids) {
  setStep(5);
  $('u-step-content').innerHTML = renderUnifyRunPanel('第五步：特征提取与品牌库沉淀', ids.length, 'AI 正在逐条提取品牌、核心词、型号及各项参数...');
  try {
    let success = 0, skipped = 0, err = 0, hasMissing = 0;
    for(let i=0;i<ids.length;i++){
      const id = ids[i];
      const label = formatUnifyItemLabel(id, i);
      setUnifyRunProgress(i, ids.length, `正在执行 ${i + 1}/${ids.length}：${label}`);
      appendUnifyRunLog(`→ [${i + 1}/${ids.length}] 开始提取特征：${label}`, 'var(--blue)');
      try{
        const r = await POST('/goods-unify/extract-features', { ids:[id] });
        const item = Array.isArray(r) ? r[0] : null;
        if(item?.status === 'success'){
          success++;
          if(Array.isArray(item.missing) && item.missing.length){
            hasMissing++;
            appendUnifyRunLog(`! ${label} 提取完成，但缺失属性：${item.missing.join('、')}`, 'var(--amber)');
          }else{
            appendUnifyRunLog(`✓ ${label} 提取完成`, 'var(--green)');
          }
        }else if(item?.status === 'skip'){
          skipped++;
          appendUnifyRunLog(`· ${label} 跳过：${item.reason || '无分类'}`, 'var(--text3)');
        }else{
          err++;
          appendUnifyRunLog(`✗ ${label} 特征提取失败：${item?.error || '未知错误'}`, 'var(--red)');
        }
      }catch(e){
        err++;
        appendUnifyRunLog(`✗ ${label} 特征提取失败：${e.message}`, 'var(--red)');
      }
      setUnifyRunProgress(i + 1, ids.length, `特征提取进度 ${i + 1}/${ids.length}`);
    }
    appendUnifyRunLog(`任务完成：成功 ${success} 条，跳过 ${skipped} 条，失败 ${err} 条`, 'var(--blue)');
    if(hasMissing) appendUnifyRunLog(`! ${hasMissing} 条存在属性缺失，请在“原始商品”中补全后重跑归一`, 'var(--amber)');
    appendUnifyRunLog('→ 正在自动进入下一步：同款识别...', 'var(--blue)');
    setTimeout(() => step6Standard(ids), 1200);
  } catch(e) { toast(e.message, 'error'); }
}

async function step6Standard(ids) {
  setStep(6);
  $('u-step-content').innerHTML = renderUnifyRunPanel('第六步：同款识别（向量Top20 + LLM）', ids.length, '正在逐条执行同款识别...');
  try {
    let done = 0, skipped = 0, err = 0, sameTotal = 0;
    for(let i=0;i<ids.length;i++){
      const id = ids[i];
      const label = formatUnifyItemLabel(id, i);
      setUnifyRunProgress(i, ids.length, `正在执行 ${i + 1}/${ids.length}：${label}`);
      appendUnifyRunLog(`→ [${i + 1}/${ids.length}] 开始同款识别：${label}`, 'var(--blue)');
      try{
        const r = await POST('/goods-unify/match-standard', { ids:[id] });
        const item = Array.isArray(r) ? r[0] : null;
        if(item?.status === 'success'){
          done++;
          sameTotal += Number(item.sameCount || 0);
          appendUnifyRunLog(`✓ ${label} 同款识别完成，同款 ${Number(item.sameCount||0)} 条，相似 ${Number(item.similarCount||0)} 条`, 'var(--green)');
        }else if(item?.status === 'skip'){
          skipped++;
          appendUnifyRunLog(`· ${label} 跳过：${item.reason || '条件不足'}`, 'var(--text3)');
        }else{
          err++;
          appendUnifyRunLog(`✗ ${label} 同款识别失败：${item?.error || '未知错误'}`, 'var(--red)');
        }
      }catch(e){
        err++;
        appendUnifyRunLog(`✗ ${label} 同款识别失败：${e.message}`, 'var(--red)');
      }
      setUnifyRunProgress(i + 1, ids.length, `同款识别进度 ${i + 1}/${ids.length}`);
    }
    appendUnifyRunLog(`任务完成：成功 ${done} 条，跳过 ${skipped} 条，失败 ${err} 条`, 'var(--blue)');
    appendUnifyRunLog(`✓ 识别到同款关联 ${sameTotal} 条`, 'var(--green)');
    setTimeout(() => step7Generate(ids), 1500);
  } catch(e) { toast(e.message, 'error'); }
}

async function step7Generate(ids) {
  setStep(7);
  $('u-step-content').innerHTML = renderUnifyRunPanel('第七步：生成标准商品', ids.length, '正在按“同款聚合”逐条创建/复用标准商品...');
  try {
    let created = 0, reused = 0, skipped = 0, err = 0, normalizedRows = 0, normalizeFailedRows = 0;
    for(let i=0;i<ids.length;i++){
      const id = ids[i];
      const label = formatUnifyItemLabel(id, i);
      setUnifyRunProgress(i, ids.length, `正在执行 ${i + 1}/${ids.length}：${label}`);
      appendUnifyRunLog(`→ [${i + 1}/${ids.length}] 开始生成标准商品：${label}`, 'var(--blue)');
      try{
        const r = await POST('/goods-unify/generate-standard', { ids:[id] });
        const item = Array.isArray(r?.results) ? r.results[0] : null;
        const s = r.summary || {};
        created += Number(s.created || 0);
        reused += Number(s.reused || 0);
        skipped += Number(s.skipped || 0);
        normalizedRows += Number(s.normalizedRows || 0);
        normalizeFailedRows += Number(s.normalizeFailedRows || 0);
        if(item?.action === 'create'){
          appendUnifyRunLog(`✓ ${label} 已新建标准商品 ${item.stdCode || ''}`, 'var(--green)');
        }else if(item?.action === 'reuse'){
          appendUnifyRunLog(`✓ ${label} 复用已有标准商品 ${item.stdCode || ''}`, 'var(--green)');
        }else{
          appendUnifyRunLog(`· ${label} 跳过：${item?.reason || '分类或属性不完整'}`, 'var(--text3)');
        }
      }catch(e){
        err++;
        normalizeFailedRows++;
        appendUnifyRunLog(`✗ ${label} 生成标准商品失败：${e.message}`, 'var(--red)');
      }
      setUnifyRunProgress(i + 1, ids.length, `生成标准商品进度 ${i + 1}/${ids.length}`);
    }
    const s = { created, reused, skipped, normalizedRows, normalizeFailedRows };
    const report = goodsImportSummary || { total: 0, success: 0, invalid: 0, duplicate: 0 };
    const importFailed = Number(report.invalid || 0) + Number(report.duplicate || 0);
    const hasFailedRows = importFailed > 0;
    appendUnifyRunLog(`任务完成：新建 ${s.created||0} 组，复用已有 ${s.reused||0} 组，跳过 ${s.skipped||0} 组，失败 ${err} 条`, 'var(--blue)');
    $('u-step-content').innerHTML += `
      <div style="margin-top:18px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:16px 18px">
        <div style="font-size:15px;font-weight:700;margin-bottom:10px">执行报告</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px">
          <div class="card-sm"><div style="font-size:12px;color:var(--text3)">导入模板行数</div><div style="font-size:24px;font-weight:700;color:var(--blue)">${report.total}</div></div>
          <div class="card-sm"><div style="font-size:12px;color:var(--text3)">成功导入</div><div style="font-size:24px;font-weight:700;color:var(--green)">${report.success}</div></div>
          <div class="card-sm"><div style="font-size:12px;color:var(--text3)">导入失败</div><div style="font-size:24px;font-weight:700;color:var(--red)">${importFailed}</div></div>
          <div class="card-sm"><div style="font-size:12px;color:var(--text3)">归一成功</div><div style="font-size:24px;font-weight:700;color:var(--cyan)">${Number(s.normalizedRows || 0)}</div></div>
          <div class="card-sm"><div style="font-size:12px;color:var(--text3)">归一失败</div><div style="font-size:24px;font-weight:700;color:#c2410c">${Number(s.normalizeFailedRows || 0)}</div></div>
        </div>
        ${hasFailedRows?`<div class="alert alert-red" style="margin-top:12px">本次有 ${importFailed} 行导入失败（含重复跳过），可下载错误日志查看具体原因。</div>`:''}
      </div>
      <div style="margin-top:20px;text-align:center;display:flex;justify-content:center;gap:10px;flex-wrap:wrap">
        ${hasFailedRows?`<button class="btn btn-outline" onclick="downloadGoodsImportErrorLog()">下载错误日志</button>`:''}
        <button class="btn btn-primary" onclick="goPage('goods-raw')">🎉 查看原始商品</button>
      </div>`;
  } catch(e) { toast(e.message, 'error'); }
}

async function batchUnifySelected(){
  const selected = Array.from(document.querySelectorAll('.row-sel:checked'));
  const ids = selected.map(c => c.value);
  if(!ids.length) return toast('请先勾选原始商品','info');
  const unifiedCount = selected.filter(c => (c.dataset.status || '').trim() === '已归一').length;
  if(unifiedCount > 0) return toast(`已归一商品不可再次发起归一，请取消勾选后重试（共 ${unifiedCount} 条）`, 'error');
  await triggerGoodsUnify(ids);
}
async function triggerGoodsUnify(ids){
  try{
    toast('正在执行归一...','info');
    const resp = await POST('/goods-unify/process-selected', { ids });
    const s = resp.summary || {};
    toast(`完成：分类${s.categoryMatched||0}条，提取${s.featureExtracted||0}条，同款识别${s.sameDetected||0}条，归一${s.goodsUnified||0}组（新建${s.stdCreated||0}/复用${s.stdReused||0}）`);
    if(typeof loadList === 'function') loadList();
  }catch(e){toast(e.message,'error');}
}
let goodsCategoryLeavesCache = [];
function parseCategoryCandidates(value){
  if(!value) return [];
  try{
    const list = JSON.parse(value);
    return Array.isArray(list) ? list : [];
  }catch(e){
    return [];
  }
}
function filterGoodsCategoryCandidates(list, currentCategoryCode=''){
  const current = String(currentCategoryCode || '').trim();
  return (Array.isArray(list) ? list : []).filter(item => item && item.code && item.code !== current);
}
function renderCategoryCandidatesCell(row){
  const list = filterGoodsCategoryCandidates(parseCategoryCandidates(row.category_candidates), row.category_code);
  if(!list.length) return '0';
  return `<button class="btn btn-outline btn-sm" onclick="openGoodsCategoryCandidates('${row.id}','${encodeURIComponent(JSON.stringify(list))}','${esc(row.category_code||'')}')">${list.length}</button>`;
}
function renderGoodsAttrPairs(row){
  const pairs = [];
  if(row.brand && row.brand !== 'unknown') pairs.push(`品牌: ${row.brand}`);
  if(row.core_word && row.core_word !== 'unknown') pairs.push(`核心词: ${formatCoreWordDisplay(row.core_word)}`);
  if(row.model && row.model !== 'unknown') pairs.push(`型号: ${row.model}`);
  let attrs = {};
  try { attrs = JSON.parse(row.attr_pairs || row.attrs_json || '{}'); } catch(e) { attrs = {}; }
  Object.keys(attrs || {}).forEach((key)=>{
    const value = attrs[key];
    if(value && value !== 'unknown') pairs.push(`${key}: ${value}`);
  });
  if(!pairs.length) return '—';
  return pairs.map(line => {
    const [label, ...rest] = String(line).split(':');
    const value = rest.join(':').trim();
    return `<div class="goods-raw-attr-line"><span class="goods-raw-attr-label">${esc(label)}:</span><span>${esc(value)}</span></div>`;
  }).join('');
}
function renderMissingAttrs(value){
  const items = String(value || '')
    .split(/[，,]/)
    .map(v => v.trim())
    .filter(Boolean);
  if(!items.length) return '—';
  return `<div class="goods-raw-missing-list">${items.map(item => `<span class="goods-raw-missing-chip">${esc(item)}</span>`).join('')}</div>`;
}
function renderGoodsActions(row){
  const attrPayload = encodeURIComponent(JSON.stringify({
    id:row.id,
    brand:row.brand,
    core_word:row.core_word,
    model:row.model,
    attrs_json:row.attrs_json,
    category_code:row.category_code,
    category_name:row.category_name,
    missing_attrs:row.missing_attrs
  }));
  const reviewPayload = encodeURIComponent(JSON.stringify({
    id:row.id,
    orig_code:row.orig_code,
    orig_name:row.orig_name,
    std_name_proposed:row.std_name_proposed,
    category_name:row.category_name,
    review_reason:row.review_reason,
    review_score:row.review_score,
    review_candidates:row.review_candidates
  }));
  const categoryLabel = row.category_code ? '改分类' : '选分类';
  const buttons = [];

  if (row.status === '待审核') {
    buttons.push(`<button class="btn btn-primary btn-sm goods-raw-action-main" onclick="openGoodsReview('${reviewPayload}')">审核处理</button>`);
    buttons.push(`<button class="btn btn-outline btn-sm" onclick="openGoodsCategoryPicker('${row.id}','${esc(row.category_code||'')}','${esc(row.category_name||'')}')">${categoryLabel}</button>`);
  } else if (row.missing_attrs) {
    buttons.push(`<button class="btn btn-primary btn-sm goods-raw-action-main" onclick="openGoodsAttrEditor('${attrPayload}')">补全属性</button>`);
    buttons.push(`<button class="btn btn-outline btn-sm" onclick="openGoodsCategoryPicker('${row.id}','${esc(row.category_code||'')}','${esc(row.category_name||'')}')">${categoryLabel}</button>`);
  } else if (row.status !== '已归一') {
    buttons.push(`<button class="btn btn-primary btn-sm goods-raw-action-main" onclick="triggerGoodsUnify(['${row.id}'])">发起归一</button>`);
    buttons.push(`<button class="btn btn-outline btn-sm" onclick="openGoodsCategoryPicker('${row.id}','${esc(row.category_code||'')}','${esc(row.category_name||'')}')">${categoryLabel}</button>`);
  } else {
    buttons.push(`<button class="btn btn-outline btn-sm" onclick="openGoodsCategoryPicker('${row.id}','${esc(row.category_code||'')}','${esc(row.category_name||'')}')">${categoryLabel}</button>`);
  }

  buttons.push(`<button class="btn btn-red btn-sm" onclick="delItem('/goods-raw','${row.id}')">删除</button>`);
  return `<div class="goods-raw-action-stack">${buttons.join('')}</div>`;
}
function formatCoreWordDisplay(value){
  const text = String(value || '').trim();
  if(!text || text === 'unknown') return text;
  if(!text.includes('+')) return text;
  const parts = text.split('+').map(v => v.trim()).filter(Boolean);
  if(parts.length !== 2) return parts.join('');
  const [a, b] = parts;
  if(/[0-9一二三四五六七八九十单双多]/.test(b)) return `${b}${a}`;
  return `${a}${b}`;
}
async function openGoodsCategoryCandidates(id, encoded, currentCategoryCode=''){

  if(!list.length) return toast('暂无疑似分类','info');

    <div class="tbl-wrap"><table>
      <thead><tr><th>#</th><th>分类编码</th><th>分类名称</th><th>相似度</th><th>操作</th></tr></thead>

function renderGoodsCategoryOptions(currentCode=''){
  const select = $('gr-cat');
  if(!select) return;
  if(currentCode) select.dataset.currentCode = currentCode;
  const activeCode = select.dataset.currentCode || '';
  const keyword = (($('gr-cat-search')?.value || '').trim()).toLowerCase();
  const filtered = goodsCategoryLeavesCache.filter(c => `${c.code} ${c.l1} ${c.l2} ${c.l3} ${c.l4}`.toLowerCase().includes(keyword));
  const options = filtered.map(c=>`<option value="${c.code}" ${c.code===activeCode?'selected':''}>${esc(`${c.code}｜${c.l1}>${c.l2}>${c.l3}>${c.l4}`)}</option>`).join('');
  select.innerHTML = `<option value="">请选择分类</option>${options}`;
  if(activeCode && filtered.some(c => c.code === activeCode)) select.value = activeCode;
}
async function openGoodsCategoryPicker(id, currentCode='', currentName=''){
  const categories = await GET('/categories?q=');
  goodsCategoryLeavesCache = (Array.isArray(categories)?categories:(categories.data||[])).filter(c => c.l4);
  openMd(`<div class="modal-title">🏷 选择商品分类</div>
    <div class="form-group"><label>当前分类</label><div style="padding:9px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:7px">${esc(currentName||'未匹配')}</div></div>

    </div>`);

}
async function setGoodsCategoryByCode(id, code, runUnify, encoded=false){
  const safeCode = encoded ? decodeURIComponent(code || '') : code;
  if(!safeCode) return toast('请选择分类','error');
  if(!goodsCategoryLeavesCache.length){
    const categories = await GET('/categories?q=');
    goodsCategoryLeavesCache = (Array.isArray(categories)?categories:(categories.data||[])).filter(c => c.l4);
  }
  const cat = goodsCategoryLeavesCache.find(c => c.code === safeCode);
  if(!cat) return toast('分类不存在','error');
  await PUT('/goods-raw/'+id, { category_code: cat.code, category_name: `${cat.l1}>${cat.l2}>${cat.l3}>${cat.l4}`, category_candidates:null, match_status:'分类已匹配', status:'未归一' });
  closeMd();
  toast('分类已保存');
  if(runUnify) await triggerGoodsUnify([id]);
  else if(typeof loadList === 'function') loadList();
}
async function saveGoodsCategory(id, runUnify){
  const code = $('gr-cat').value;
  await setGoodsCategoryByCode(id, code, runUnify);
}

async function openGoodsAttrEditor(payload){
  const row = JSON.parse(decodeURIComponent(payload));

    <div class="form-group"><label>品牌</label><input type="text" id="ga-brand" value="${esc(row.brand||'')}" placeholder="品牌"></div>

    <div class="modal-footer"><button class="btn btn-outline" onclick="closeMd()">取消</button><button class="btn btn-primary" onclick="saveGoodsAttrs('${row.id}','${encodeURIComponent(JSON.stringify(keyAttrs))}')">保存</button></div>`);

async function saveGoodsAttrs(id, keyPayload){
  const keyAttrs = JSON.parse(decodeURIComponent(keyPayload));
  const attrs = {};
  keyAttrs.forEach((k, idx) => { attrs[k] = $(`ga-attr-${idx}`)?.value?.trim() || 'unknown'; });
  try{
    await POST('/goods-unify/update-attrs', {
      id,
      brand: $('ga-brand').value.trim() || 'unknown',
      core_word: $('ga-core').value.trim() || 'unknown',

    });
    closeMd();
    toast('属性已更新，可重新发起归一');

  }catch(e){toast(e.message,'error');}
}
function openGoodsReview(payload){
  const row = JSON.parse(decodeURIComponent(payload));
  const candidates = (()=>{ try { return JSON.parse(row.review_candidates||'[]'); } catch(e) { return []; } })();
  const candidateHtml = candidates.length
    ? `<div class="tbl-wrap" style="margin-top:10px"><table><thead><tr><th>候选编码</th><th>候选标准品</th><th>相似度</th><th>操作</th></tr></thead><tbody>${candidates.map(c=>`<tr><td style="font-family:monospace;color:var(--blue)">${esc(c.code||'')}</td><td>${esc(c.name||'')}</td><td><span class="badge b-amber">${typeof c.score==='number'?c.score.toFixed(3):c.score||'—'}</span></td><td><button class="btn btn-primary btn-sm" onclick="submitGoodsReview('${row.id}','match_existing','${esc(c.code||'')}')">归到此标准品</button></td></tr>`).join('')}</tbody></table></div>`
    : `<div class="alert alert-blue" style="margin-top:10px">当前没有可直接复用的候选标准品，建议新建标准商品。</div>`;
  openMd(`<div class="modal-title">🧾 商品归一人工审核</div>
    <div class="alert alert-amber">原始商品 <strong>${esc(row.orig_code||'')}</strong> 进入待审核，系统未自动归一。</div>
    <div class="card-sm">
      <div style="font-size:12px;color:var(--text3);margin-bottom:6px">原始名称</div>
      <div style="font-weight:600">${esc(row.orig_name||'—')}</div>
      <div style="font-size:12px;color:var(--text3);margin:12px 0 6px">建议标准名</div>
      <div>${esc(row.std_name_proposed||'—')}</div>
      <div style="display:flex;gap:16px;margin-top:12px;flex-wrap:wrap">
        <div><span style="font-size:12px;color:var(--text3)">品类</span><div>${esc(row.category_name||'—')}</div></div>
        <div><span style="font-size:12px;color:var(--text3)">最高相似度</span><div>${row.review_score?Number(row.review_score).toFixed(3):'—'}</div></div>
      </div>
      <div style="font-size:12px;color:var(--text3);margin:12px 0 6px">待审核原因</div>
      <div>${esc(row.review_reason||'—')}</div>
    </div>
    <div style="margin-top:16px;font-size:13px;font-weight:600">候选标准商品</div>
    ${candidateHtml}
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeMd()">取消</button>
      <button class="btn btn-green" onclick="submitGoodsReview('${row.id}','create_new')">新建标准商品</button>
    </div>`);
}
async function submitGoodsReview(id, action, stdCode=''){
  const isCreate = action === 'create_new';
  if(isCreate && !confirm('确认基于当前建议标准名新建标准商品吗？')) return;
  try{
    await POST('/goods-unify/review-standard', { id, action, stdCode });
    closeMd();
    if(typeof loadList === 'function') loadList();
    toast(isCreate?'已新建标准商品并完成归一':'已完成人工归一');
  }catch(e){toast(e.message,'error');}
}
async function exportFullRaw(){
  const res=await GET('/goods-raw?q=');
  const d = Array.isArray(res) ? res : (res.data || []);
  const headers = ['原始编码','原始名称','原始规格','原始品牌','提取品牌','核心词','型号','属性对','属性向量','品类编码','品类名称','同款数','相似商品数','标准编码','标准名称','状态'];
  const rows = d.map(r=>[r.orig_code,r.orig_name,r.orig_spec||r.spec||'',r.orig_brand||'',r.brand,r.core_word,r.model,r.attr_pairs||r.attrs_json||(String(r.spec||'').trim().startsWith('{')?r.spec:''),r.attrs_vector||'',r.category_code,r.category_name,r.same_count||0,r.similar_count||0,r.std_code,r.std_name,r.status]);
  exportCSV('原始商品全量数据.csv', headers, rows);
}

function parseMatCandidates(value){
  if(!value) return [];
  try{
    const arr = JSON.parse(value);
    return Array.isArray(arr) ? arr : [];
  }catch(e){return [];}
}
function filterSuspectMaterials(list, currentMatCode=''){
  const current = String(currentMatCode || '').trim();
  return (Array.isArray(list) ? list : []).filter(item => item && item.code && item.code !== current);
}
function renderSuspectMaterialCell(row){
  const list = filterSuspectMaterials(parseMatCandidates(row.mat_candidates), row.mat_code);
  if(!list.length) return '0';
  return `<button class="btn btn-outline btn-sm" onclick="openSuspectMaterials('${encodeURIComponent(JSON.stringify({id:row.id,goods_code:row.goods_code,goods_name:row.goods_name,mat_code:row.mat_code,mat_candidates:JSON.stringify(list)}))}')">${list.length}</button>`;
}
let mappingMatCache = [];
function renderManualMatOptions(currentCode=''){
  const select = $('mm-mat');
  if(!select) return;
  if(currentCode) select.dataset.currentCode = currentCode;
  const activeCode = select.dataset.currentCode || '';
  const kw = (($('mm-search')?.value || '').trim()).toLowerCase();
  const list = mappingMatCache.filter(m => `${m.code} ${m.name}`.toLowerCase().includes(kw)).slice(0, 600);
  const opts = list.map(m => `<option value="${m.code}" ${m.code===activeCode?'selected':''}>${esc(`${m.code}｜${m.name}`)}</option>`).join('');
  select.innerHTML = `<option value="">请选择物料</option>${opts}`;
  if(activeCode && list.some(m => m.code === activeCode)) select.value = activeCode;
}
async function openManualMaterialMap(payload){
  const row = JSON.parse(decodeURIComponent(payload || '{}'));
  if(!row?.id) return toast('标准商品信息缺失','error');
  if(!mappingMatCache.length){
    const mats = await GET('/mat-archive?q=');
    mappingMatCache = Array.isArray(mats) ? mats : (mats.data || []);
  }
  openMd(`<div class="modal-title">🧩 手动关联物料</div>
    <div class="alert alert-blue">标准商品：<strong>${esc(row.goods_code||'')}</strong> ${esc(row.goods_name||'')}</div>
    <div class="form-group"><label>当前关联</label><div style="padding:9px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:7px">${row.mat_code?`${esc(row.mat_code)}｜${esc(row.mat_name||'')}`:'未关联'}</div></div>
    <div class="form-group"><label>搜索物料</label><input type="text" id="mm-search" placeholder="输入物料编码/名称快速筛选" oninput="renderManualMatOptions()"></div>
    <div class="form-group"><label>选择物料</label><select id="mm-mat" data-current-code="${esc(row.mat_code||'')}"><option value="">请选择物料</option></select></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeMd()">取消</button>
      <button class="btn btn-primary" onclick="saveManualMaterialMap('${encodeURIComponent(JSON.stringify({id:row.id}))}')">保存关联</button>
    </div>`);
  renderManualMatOptions(row.mat_code || '');
}
async function saveManualMaterialMap(payload){
  const row = JSON.parse(decodeURIComponent(payload || '{}'));
  const matCode = $('mm-mat')?.value || '';
  if(!row?.id) return toast('标准商品信息缺失','error');
  if(!matCode) return toast('请选择物料','error');
  try{
    await POST('/goods-unify/manual-match-material', { stdId: row.id, matCode });
    closeMd();
    toast('手动关联成功');
    if(typeof loadList === 'function') loadList();
  }catch(e){toast(e.message,'error');}
}
async function openSuspectMaterials(payload){
  const row = JSON.parse(decodeURIComponent(payload || '{}'));
  const list = filterSuspectMaterials(parseMatCandidates(row.mat_candidates), row.mat_code);
  if(!row?.id) return toast('标准商品信息缺失','error');
  if(!list.length) return toast('暂无疑似物料','info');
  const rows = list.map((m, idx) => `<tr>
    <td>${idx + 1}</td>
    <td style="font-family:monospace;color:var(--blue)">${esc(m.code||'')}</td>
    <td>${esc(m.name||'')}</td>
    <td>${Number(m.score||0).toFixed(4)}</td>
    <td><button class="btn btn-primary btn-sm" onclick="quickBindSuspectMaterial('${row.id}','${encodeURIComponent(m.code||'')}',true)">关联此物料</button></td>
  </tr>`).join('');
  openMd(`<div class="modal-title">🔎 疑似物料</div>
    <div class="alert alert-blue">标准商品：<strong>${esc(row.goods_code||'')}</strong> ${esc(row.goods_name||'')}</div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>#</th><th>物料编码</th><th>物料名称</th><th>相似度</th><th>操作</th></tr></thead>

    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeMd()">关闭</button>
      <button class="btn btn-outline" onclick="closeMd();openManualMaterialMap('${encodeURIComponent(JSON.stringify({id:row.id,goods_code:row.goods_code,goods_name:row.goods_name}))}')">手动搜索关联</button>
    </div>`);
}

    toast('关联成功');

function openMaterialMatchRunModal(title, total){
  openMd(`<div class="modal-title">⚙ ${esc(title || 'AI关联物料执行过程')}</div>
    <div class="alert alert-blue">本次任务：${Number(total||0)} 条标准商品</div>
    <div class="progress-bar"><div class="progress-fill" id="mm-run-prog" style="width:0%;background:linear-gradient(90deg,var(--blue),var(--cyan))"></div></div>
    <div id="mm-run-status" style="font-size:12px;color:var(--text3);margin-top:8px">任务已创建，准备执行...</div>
    <div id="mm-run-log" style="margin-top:12px;max-height:300px;overflow-y:auto;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;font-size:12px;line-height:1.7"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" id="mm-run-close" onclick="closeMd()" disabled>关闭</button>
    </div>`);
}
function setMaterialMatchRunProgress(percent, statusText){
  const bar = $('mm-run-prog');
  if(bar) bar.style.width = `${Math.max(0, Math.min(100, Number(percent||0)))}%`;
  if($('mm-run-status')) $('mm-run-status').textContent = statusText || '';
}
function appendMaterialMatchRunLog(text, color='var(--text2)'){
  const log = $('mm-run-log');
  if(!log) return;
  log.innerHTML += `<div style="color:${color}">${esc(text)}</div>`;
  log.scrollTop = log.scrollHeight;
}
async function runMaterialMatchWithDialog(ids, title='AI关联物料执行过程'){
  if(!ids || !ids.length) return;
  openMaterialMatchRunModal(title, ids.length);
  appendMaterialMatchRunLog(`开始执行，目标 ${ids.length} 条商品...`, 'var(--blue)');
  setMaterialMatchRunProgress(12, '正在提交任务并加载候选物料向量...');
  try{
    const r = await POST('/goods-unify/match-material', { ids });
    const list = Array.isArray(r) ? r : [];
    setMaterialMatchRunProgress(75, 'AI判定已返回，正在汇总结果...');
    let ok = 0, none = 0, err = 0;
    list.forEach((item, idx) => {
      const label = `${item.goodsCode || item.id || `#${idx+1}`}${item.goodsName?`｜${item.goodsName}`:''}`;
      if(item.status === 'success'){
        ok++;
        appendMaterialMatchRunLog(`✓ ${label} -> ${item.matCode || ''}${item.matName?`｜${item.matName}`:''}`, 'var(--green)');
      }else if(item.status === 'none'){
        none++;
        const suspectCount = Array.isArray(item.candidates) ? item.candidates.length : 0;
        appendMaterialMatchRunLog(`! ${label} 未自动匹配，疑似物料 ${suspectCount} 条`, 'var(--amber)');
      }else{
        err++;
        appendMaterialMatchRunLog(`✗ ${label} 执行失败：${item.error || '未知错误'}`, 'var(--red)');
      }
    });
    setMaterialMatchRunProgress(100, `执行完成：成功 ${ok} 条，未匹配 ${none} 条，失败 ${err} 条`);
    appendMaterialMatchRunLog(`任务完成：成功 ${ok}，未匹配 ${none}，失败 ${err}`, 'var(--blue)');
    $('mm-run-close') && ($('mm-run-close').disabled = false);
    toast(`AI关联完成：成功 ${ok} 条${none?`，未匹配 ${none} 条`:''}${err?`，失败 ${err} 条`:''}`, err ? 'info' : 'success');
    if(typeof loadList === 'function') loadList();
  }catch(e){
    setMaterialMatchRunProgress(100, '任务执行失败');
    appendMaterialMatchRunLog(`✗ 任务失败：${e.message}`, 'var(--red)');
    $('mm-run-close') && ($('mm-run-close').disabled = false);
    toast(e.message,'error');
  }
}
async function mappingBatchMatch(){
  const ids = selectedRowIds();
  if(!ids.length) return toast('请先勾选标准商品','info');
  await runMaterialMatchWithDialog(ids, 'AI批量关联物料执行过程');

async function saveNewMapping(){
  const gv=$('nm1').value,mv=$('nm2').value;
  if(!gv||!mv){toast('请选择商品和物料','error');return;}
  const [gc,gn]=gv.split('|');const [mc,mn]=mv.split('|');
  await POST('/mapping',{goods_code:gc,goods_name:gn,mat_code:mc,mat_name:mn,type:$('nm3').value,method:$('nm4').value});
  closeMd();loadList();toast('已新增映射');

function editMapping(id,gc,gn,mc,mn,type,method){
  openMd(`<div class="modal-title">✏️ 编辑映射</div>
  <div class="form-group"><label>商品编码</label><input type="text" id="em1" value="${gc}"></div>

  <div class="form-group"><label>映射类型</label><select id="em5"><option>1:1</option><option>1:N</option><option>N:1</option></select></div>
  <div class="form-group"><label>映射方式</label><select id="em6"><option>人工确认</option><option>AI匹配</option></select></div>

}
async function saveEditMapping(id){await PUT('/mapping/'+id,{goods_code:$('em1').value,goods_name:$('em2').value,mat_code:$('em3').value,mat_name:$('em4').value,type:$('em5').value,method:$('em6').value});closeMd();loadList();toast('已保存');}
async function exportMapping(){
  let page = 1;
  const all = [];
  while(true){
    const resp = await GET(`/mapping-std?page=${page}&limit=100`);
    const rows = resp.data || [];
    all.push(...rows);
    if(all.length >= Number(resp.total || 0) || !rows.length) break;
    page++;
  }
  exportCSV('商品物料映射.csv',['标准商品编码','标准商品名称','关联原始商品数','物料编码','物料名称','疑似物料数','映射类型','映射方式'],all.map(m=>[m.goods_code,m.goods_name,m.raw_count||0,m.mat_code||'',m.mat_name||'',parseMatCandidates(m.mat_candidates).length,m.type||'',m.method||'']));
  toast('已导出');
}

async function delItem(apiPath, id){

}

// ══════════════════════════════════════════════════
// 通用 CSV导入辅助
// ══════════════════════════════════════════════════
async function importRaw(inp, apiPath, nameHint, csvCols, dbCols){
  const f=inp.files[0];if(!f)return;
  const fd=new FormData();fd.append('file',f);
  const r=await UPLOAD('/upload/csv',fd).catch(e=>{toast(e.message,'error');return null;});
  if(!r)return;
  for(const row of r.rows){
    const obj={status:'未治理',source:'手动导入'};
    csvCols.forEach((col,i)=>obj[dbCols[i]]=row[col]||'');
    await POST('/'+apiPath,obj);
  }
  loadList();toast(`导入 ${r.rows.length} 条`);inp.value='';
}
